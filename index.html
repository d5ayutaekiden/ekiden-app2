function App() {
  const [records, setRecords]     = useLS('ekiden_records', []);
  const [failedRecords, setFailedRecords] = useLS('ekiden_failed_records', []);
  const [templates, setTemplates] = useLS('ekiden_templates', []);
  const [scriptUrl, setScriptUrl] = useLS('ekiden_script_url', '');
  const [athletes, setAthletes]   = useLS('ekiden_athletes', []);
  const [contentTags, setContentTags] = useLS('ekiden_content_tags', ['各自', '集団走', 'Free']);
  // 個人選択モード
  const [userMode, setUserMode]       = useLS('ekiden_user_mode', null);
  const [selectedUser, setSelectedUser] = useLS('ekiden_selected_user', null);
  // 管理画面PIN
  const [adminPin, setAdminPin]       = useLS('ekiden_admin_pin', '');
  // セッションメタデータ / PDF履歴
  const [sessionMeta, setSessionMeta] = useLS('ekiden_session_meta', {});
  const [pdfHistory, setPdfHistory]   = useLS('ekiden_pdf_history', []);
  const [tab, setTab]             = useState('jog');
  const [s, setS]                 = useState({
    date: today(), location: '名城G', statusDiv: '通常',
    sessionName: '朝練習', temperature: '', humidity: '', wind: '',
  });
  const [showSettings, setShowSettings] = useState(false);
  const [syncState, setSyncState]       = useState(null);
  const [loading, setLoading]           = useState(true);
  const [showAdminPin, setShowAdminPin] = useState(false);
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const [editingTemplateIdx, setEditingTemplateIdx] = useState(null);
  const [editTmplName, setEditTmplName] = useState('');
  const [editTmplMenu, setEditTmplMenu] = useState('');
  const syncTimer = useRef(null);

  // 派生値
  const isManager = userMode === 'manager';
  const isAthlete = userMode === 'athlete';
  const myName    = isAthlete ? selectedUser : null;

  // 選手モードで管理タブにいたらjogに戻す
  useEffect(() => {
    if (isAthlete && tab === 'admin') setTab('jog');
  }, [isAthlete]);

  useEffect(() => {
    const initializeApp = async () => {
      if (scriptUrl) {
        const data = await fetchMasterData(scriptUrl);
        if (data && data.athletes && data.contentTags) {
          const sorted = data.athletes.sort((a, b) => {
            const yOrder = { '4年': 0, '3年': 1, '2年': 2, '1年': 3 };
            if (yOrder[a.year] !== yOrder[b.year]) return yOrder[a.year] - yOrder[b.year];
            return a.name.localeCompare(b.name, 'ja');
          });
          setAthletes(sorted);
          setContentTags(data.contentTags);
        }
      }
      setLoading(false);
    };
    initializeApp();
  }, [scriptUrl]);

  const onChange = (field, val) => setS(p => ({ ...p, [field]: val }));
  const saveSessionMeta = (date, sessionName, meta) => {
    const key = `${date}_${sessionName}`;
    setSessionMeta(prev => ({ ...prev, [key]: meta }));
  };
  const recordPdfExport = (entry) => setPdfHistory(prev => [...prev, entry]);
  const common   = { s, onChange, onSaveSessionMeta: saveSessionMeta };

  const showSync = (state) => {
    setSyncState(state);
    clearTimeout(syncTimer.current);
    if (state.status !== 'syncing') {
      syncTimer.current = setTimeout(() => setSyncState(null), 4000);
    }
  };

  const sendToSheets = useCallback(async (recs) => {
    if (!scriptUrl) return;
    showSync({ status: 'syncing' });
    try {
      await postToSheets(scriptUrl, recs);
      if (scriptUrl) {
        const data = await fetchMasterData(scriptUrl);
        if (data && data.athletes && data.contentTags) {
          const sorted = data.athletes.sort((a, b) => {
            const yOrder = { '4年': 0, '3年': 1, '2年': 2, '1年': 3 };
            if (yOrder[a.year] !== yOrder[b.year]) return yOrder[a.year] - yOrder[b.year];
            return a.name.localeCompare(b.name, 'ja');
          });
          setAthletes(sorted);
          setContentTags(data.contentTags);
        }
      }
      showSync({ status: 'ok', count: recs.length });
      setFailedRecords(prev => prev.filter(f => !recs.find(r => r.id === f.id)));
    } catch {
      showSync({ status: 'error', count: recs.length });
      setFailedRecords(prev => {
        const existing = new Set(prev.map(r => r.id));
        const newFailed = recs.filter(r => !existing.has(r.id));
        return [...prev, ...newFailed];
      });
    }
  }, [scriptUrl]);

  const addRecords = (recs) => {
    setRecords(prev => [...prev, ...recs]);
    sendToSheets(recs);
  };

  const deleteRecord  = id   => setRecords(prev => prev.filter(r => r.id !== id));
  const deleteAll     = ()   => setRecords([]);
  const updateRecord  = r    => setRecords(prev => prev.map(x => x.id === r.id ? r : x));
  const retryFailed   = recs => {
    sendToSheets(recs);
  };
  const addTemplate    = tmpl        => setTemplates(prev => [...prev, tmpl]);
  const updateTemplate = (idx, tmpl) => setTemplates(prev => prev.map((t,i) => i===idx ? tmpl : t));
  const deleteTemplate = idx         => setTemplates(prev => prev.filter((_,i) => i!==idx));

  const addAthlete     = a => setAthletes(prev => [...prev, a]);
  const deleteAthlete  = i => setAthletes(prev => prev.filter((_,j) => j!==i));
  const addContentTag  = t => setContentTags(prev => [...prev, t]);
  const deleteContentTag = i => setContentTags(prev => prev.filter((_,j) => j!==i));

  // 機能8: インポート処理
  const handleImport = (data) => {
    if (Array.isArray(data.records))     setRecords(data.records);
    if (Array.isArray(data.templates))   setTemplates(data.templates);
    if (Array.isArray(data.athletes))    setAthletes(data.athletes);
    if (Array.isArray(data.contentTags)) setContentTags(data.contentTags);
  };

  const todayCount = records.filter(r => r.date === today()).length;

  const TABS = [
    { id: 'jog',     icon: '🏃', label: 'ジョグ入力' },
    { id: 'point',   icon: '⚡', label: 'ポイント練習' },
    { id: 'records', icon: '📋', label: `記録一覧 (${records.length})`, badge: todayCount > 0 ? `今日${todayCount}件` : null },
    ...(isAthlete ? [] : [{ id: 'admin', icon: '⚙', label: '管理画面' }]),
  ];

  // 管理タブクリック時のPINロック制御
  const handleTabClick = (tabId) => {
    if (tabId === 'admin' && !adminUnlocked) {
      setShowAdminPin(true);
      return;
    }
    setTab(tabId);
  };

  if (loading) return <div className="min-h-screen bg-gray-100 flex items-center justify-center">読み込み中...</div>;

  // 個人未選択時は選択モーダルを表示
  if (userMode === null) {
    return (
      <PersonSelectModal
        athletes={athletes}
        onConfirm={(mode, name) => { setUserMode(mode); setSelectedUser(name); }}
      />
    );
  }

  return (
    <div className="min-h-screen bg-gray-100">
      <header style={{background: 'linear-gradient(135deg, #a52a2a 0%, #8b3a3a 50%, #6b2424 100%)'}} className="text-white px-4 py-3 shadow-lg">
        <div className="flex items-center justify-between max-w-4xl mx-auto">
          <div>
            <h1 className="text-lg font-bold tracking-wide">女子駅伝部 練習記録</h1>
            <p className="text-blue-200 text-xs mt-0.5 flex items-center gap-1.5">
              Practice Record Manager
              {scriptUrl
                ? <span className="bg-green-500 text-white text-xs px-1.5 py-0.5 rounded-full">Sheets連携中</span>
                : <span className="bg-blue-500/60 text-blue-100 text-xs px-1.5 py-0.5 rounded-full">ローカル保存</span>}
            </p>
            <div className="mt-1 flex items-center gap-2">
              <span className="text-blue-100 text-xs">
                {isManager ? '👑 マネージャー' : `🏃 ${selectedUser}`}
              </span>
              <button type="button"
                onClick={() => { setUserMode(null); setSelectedUser(null); setAdminUnlocked(false); setTab('jog'); }}
                className="text-xs bg-blue-500/40 hover:bg-blue-500/70 text-white px-2 py-0.5 rounded-full transition-colors">
                切り替え
              </button>
            </div>
          </div>
          <button type="button" onClick={() => setShowSettings(true)}
            className="w-9 h-9 flex items-center justify-center rounded-full bg-blue-500/40 hover:bg-blue-500/70 transition-colors text-lg"
            title="設定">⚙</button>
        </div>
      </header>

      <nav className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-20">
        <div className="flex max-w-4xl mx-auto overflow-x-auto">
          {TABS.map(t => (
            <button key={t.id} type="button" onClick={() => handleTabClick(t.id)}
              className={`flex-1 py-3 px-2 text-xs sm:text-sm font-medium transition-colors whitespace-nowrap
                ${tab === t.id ? 'tab-active' : 'tab-inactive'}`}>
              <span className="mr-1">{t.icon}</span>
              <span className="hidden xs:inline sm:inline">{t.label}</span>
              {/* 機能6: バッジ */}
              {t.badge && (
                <span className="ml-1 inline-block bg-red-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-full leading-none">{t.badge}</span>
              )}
            </button>
          ))}
        </div>
      </nav>

      <main className="max-w-4xl mx-auto p-3 sm:p-4 pb-12">
        {tab === 'jog'     && <JogView     common={common} onSave={addRecords}
                                onSaveSessionMeta={saveSessionMeta}
                                athletes={athletes} contentTags={contentTags} records={records} myName={myName} />}
        {tab === 'point'   && <PointView   common={common} onSave={addRecords}
                                onSaveSessionMeta={saveSessionMeta}
                                templates={templates} onSaveTemplate={addTemplate}
                                onUpdateTemplate={updateTemplate} onDeleteTemplate={deleteTemplate}
                                athletes={athletes} contentTags={contentTags} />}
        {tab === 'records' && <RecordsView records={records} onDelete={deleteRecord}
                                onDeleteAll={deleteAll} scriptUrl={scriptUrl} athletes={athletes}
                                onResend={recs => sendToSheets(recs)} onUpdateRecord={updateRecord}
                                failedRecords={failedRecords} onRetryFailed={retryFailed}
                                myName={myName} sessionMeta={sessionMeta} onRecordPdfExport={recordPdfExport} />}
        {tab === 'admin'   && <AdminView   athletes={athletes} onAddAthlete={addAthlete} onDeleteAthlete={deleteAthlete}
                                templates={templates} onSaveTemplate={addTemplate}
                                onUpdateTemplate={updateTemplate} onDeleteTemplate={deleteTemplate}
                                contentTags={contentTags} onAddContentTag={addContentTag} onDeleteContentTag={deleteContentTag}
                                records={records} onImport={handleImport} isAthlete={isAthlete}
                                editingTemplateIdx={editingTemplateIdx} setEditingTemplateIdx={setEditingTemplateIdx}
                                editTmplName={editTmplName} setEditTmplName={setEditTmplName}
                                editTmplMenu={editTmplMenu} setEditTmplMenu={setEditTmplMenu} />}
      </main>

      {showSettings && (
        <SettingsModal scriptUrl={scriptUrl}
          onSave={url => setScriptUrl(url)}
          onClose={() => setShowSettings(false)} />
      )}
      {showAdminPin && (
        <AdminPinModal
          mode={adminPin === '' ? 'set' : 'enter'}
          savedPin={adminPin}
          onSuccess={(newPin) => {
            if (newPin) setAdminPin(newPin);
            setAdminUnlocked(true);
            setShowAdminPin(false);
            setTab('admin');
          }}
          onClose={() => setShowAdminPin(false)}
        />
      )}

      {/* テンプレ編集モーダル */}
      {editingTemplateIdx !== null && templates[editingTemplateIdx] && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setEditingTemplateIdx(null)}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
            <h2 className="text-base font-bold text-gray-800 mb-4">✏️ テンプレを編集</h2>

            <div className="space-y-3 mb-4">
              <label className="block">
                <span className="text-xs text-gray-500 font-semibold mb-1 block">テンプレ名</span>
                <input type="text" value={editTmplName} onChange={e => setEditTmplName(e.target.value)}
                  className="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-purple-300 outline-none" />
              </label>

              <label className="block">
                <span className="text-xs text-gray-500 font-semibold mb-1 block">セッション表示名</span>
                <textarea value={editTmplMenu} onChange={e => setEditTmplMenu(e.target.value)}
                  rows="3"
                  placeholder="例: 1000m×5本+200m×5本"
                  className="w-full border rounded px-3 py-2 text-sm focus:ring-2 focus:ring-purple-300 outline-none" />
              </label>

              <div className="p-2 bg-gray-50 border border-gray-200 rounded text-xs text-gray-600">
                <div className="font-semibold mb-1">ℹ️ ブロック内容</div>
                <div className="max-h-32 overflow-y-auto font-mono text-xs space-y-1">
                  {templates[editingTemplateIdx].blocks.map((b, i) => (
                    <div key={i} className="text-gray-700">
                      Block {i + 1}: {b.distanceM}m × {b.reps}本 {parseInt(b.sets) > 1 ? `× ${b.sets}set` : ''}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="flex gap-2 justify-end">
              <button type="button" onClick={() => setEditingTemplateIdx(null)}
                className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 transition-colors">
                キャンセル
              </button>
              <button type="button" onClick={() => {
                updateTemplate(editingTemplateIdx, {
                  name: editTmplName,
                  sessionMenu: editTmplMenu,
                  blocks: templates[editingTemplateIdx].blocks
                });
                setEditingTemplateIdx(null);
              }}
                className="px-4 py-2 bg-purple-600 text-white text-sm font-semibold rounded-lg hover:bg-purple-700 transition-colors">
                保存
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
