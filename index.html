                </td>
                <td className="px-2 py-1.5">
                  <input type="text" value={row.note}
                    onChange={e => update(row.name, 'note', e.target.value)}
                    style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#00a8cc'}}
                    className="w-full border-2 rounded px-2 py-1 text-sm focus:ring-2 outline-none font-semibold"
                    placeholder="（任意）" />
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* iPhone用カード形式 */}
      <div className="md:hidden space-y-3">
        {displayed.map((row, i) => (
          <div key={row.name} className={`p-3 rounded-lg border-2 ${checkedNames.has(row.name) ? 'bg-cyan-50 border-cyan-400' : (row.statusDiv === '故障' ? 'bg-red-50 border-red-200' : 'bg-white border-gray-200')} shadow-sm`}>
            <div className="flex items-start gap-2 mb-3">
              {!myName && (
                <input type="checkbox" checked={checkedNames.has(row.name)} onChange={() => toggleOne(row.name)}
                  className="w-4 h-4 mt-0.5" style={{accentColor: '#a52a2a'}} />
              )}
              <div className="flex-1">
                <div className={`font-bold text-sm ${row.statusDiv === '故障' ? 'text-red-600' : 'text-gray-800'}`}>{row.name}</div>
                <div className="text-xs text-gray-500">{row.year}</div>
              </div>
            </div>

            <div className="space-y-2">
              <div className="grid grid-cols-2 gap-2">
                <div>
                  <label className="text-xs text-gray-600 font-semibold block mb-1">距離 km</label>
                  <input type="number" step="0.1" min="0" value={row.distanceKm}
                    onChange={e => update(row.name, 'distanceKm', e.target.value)}
                    style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#00a8cc'}}
                    className="w-full border-2 rounded px-2 py-1.5 text-sm text-center font-semibold focus:ring-2 outline-none"
                    placeholder="—" />
                </div>
                <div>
                  <label className="text-xs text-gray-600 font-semibold block mb-1">時間 分</label>
                  <input type="number" step="1" min="0" value={row.durationMin}
                    onChange={e => update(row.name, 'durationMin', e.target.value)}
                    style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#00a8cc'}}
                    className="w-full border-2 rounded px-2 py-1.5 text-sm text-center font-semibold focus:ring-2 outline-none"
                    placeholder="—" />
                </div>
              </div>

              <div>
                <label className="text-xs text-gray-600 font-semibold block mb-1">内容タグ</label>
                <select value={row.contentTag} onChange={e => update(row.name, 'contentTag', e.target.value)}
                  style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#1f2937'}}
                  className="w-full border-2 rounded px-2 py-1.5 text-xs focus:ring-2 outline-none">
                  {contentTags.map(t => <option key={t}>{t}</option>)}
                </select>
              </div>

              <div>
                <label className="text-xs text-gray-600 font-semibold block mb-1">状態区分</label>
                <select value={row.statusDiv} onChange={e => update(row.name, 'statusDiv', e.target.value)}
                  style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#1f2937'}}
                  className="w-full border-2 rounded px-2 py-1.5 text-xs focus:ring-2 outline-none">
                  {STATUS_DIVS.map(s => <option key={s}>{s}</option>)}
                </select>
              </div>

              <div>
                <label className="text-xs text-gray-600 font-semibold block mb-1">備考</label>
                <input type="text" value={row.note}
                  onChange={e => update(row.name, 'note', e.target.value)}
                  style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#00a8cc'}}
                  className="w-full border-2 rounded px-2 py-1.5 text-sm focus:ring-2 outline-none font-semibold"
                  placeholder="（任意）" />
              </div>
            </div>
          </div>
        ))}
      </div>

      <div className="mt-4 flex items-center gap-3 flex-wrap">
        <button type="button" onClick={handleSave}
          style={{background: 'linear-gradient(135deg, #a52a2a 0%, #8b3a3a 100%)', boxShadow: '0 6px 20px rgba(165, 42, 42, 0.25)'}}
          className="px-6 py-2.5 text-white rounded-lg font-semibold text-sm hover:opacity-90 active:opacity-80 transition-all shadow-lg">
          保存（入力済みのみ）
        </button>
        {/* 機能4: 前日コピーボタン */}
        <button type="button" onClick={handlePrevDayCopy}
          className="px-4 py-2.5 bg-white text-gray-700 rounded-lg font-semibold text-sm hover:bg-gray-50 active:bg-gray-100 transition-colors shadow-sm border-2"
          style={{borderColor: 'rgba(165, 42, 42, 0.3)'}}>
          前日コピー
        </button>
        <SavedToast show={saved} />
      </div>
    </div>
  );
}

// ======================================================
// BLOCK CARD (Point Practice)
// ======================================================
function BlockCard({ block, idx, total, onChange, onDelete, ct, onAddCt, onRemoveCt }) {
  const set = (field, val) => onChange(block.id, field, val);
  const preview = buildPointMenu(block);
  const km = calcPointKm(block.distanceM, block.reps, block.sets);

  return (
    <div className="border border-gray-200 rounded-xl p-3 bg-white shadow-sm mb-3">
      <div className="flex items-center justify-between mb-2">
        <span className="text-xs font-bold text-gray-500 uppercase tracking-wide">ブロック {idx + 1}</span>
        <div className="flex items-center gap-2">
          {km > 0 && <span className="text-xs text-blue-600 font-medium bg-blue-50 px-2 py-0.5 rounded-full">{km} km</span>}
          {total > 1 && (
            <button type="button" onClick={() => onDelete(block.id)}
              className="text-red-400 hover:text-red-600 text-base leading-none w-6 h-6 flex items-center justify-center rounded hover:bg-red-50 transition-colors">
              ×
            </button>
          )}
        </div>
      </div>

      <div className="grid grid-cols-3 gap-2 mb-2">
        <CustomTmplField label="距離 m" required type="number"
          value={block.distanceM} onChange={v => set('distanceM', v)} placeholder="1000"
          defaultItems={TMPL_DIST} customItems={ct.dist}
          onAddCustom={v => onAddCt('dist', v)} onRemoveCustom={i => onRemoveCt('dist', i)} />
        <CustomTmplField label="本数" required type="number"
          value={block.reps} onChange={v => set('reps', v)} placeholder="5"
          defaultItems={TMPL_REPS} customItems={ct.reps}
          onAddCustom={v => onAddCt('reps', v)} onRemoveCustom={i => onRemoveCt('reps', i)} />
        <CustomTmplField label="セット数" type="number"
          value={block.sets} onChange={v => set('sets', v)} placeholder="1"
          defaultItems={TMPL_SETS} customItems={ct.sets}
          onAddCustom={v => onAddCt('sets', v)} onRemoveCustom={i => onRemoveCt('sets', i)} />
      </div>

      <div className="grid grid-cols-1 gap-2 sm:grid-cols-3 mb-2">
        <CustomTmplField label="設定"
          value={block.target} onChange={v => set('target', v)} placeholder="3'10&quot;"
          defaultItems={TMPL_TARGET} customItems={ct.target}
          onAddCustom={v => onAddCt('target', v)} onRemoveCustom={i => onRemoveCt('target', i)} />
        <CustomTmplField label="本数間レスト"
          value={block.restBetweenReps} onChange={v => set('restBetweenReps', v)} placeholder="R=2'00&quot;"
          defaultItems={TMPL_REST_REPS} customItems={ct.restReps}
          onAddCustom={v => onAddCt('restReps', v)} onRemoveCustom={i => onRemoveCt('restReps', i)} />
        <CustomTmplField label="セット間レスト"
          value={block.restBetweenSets} onChange={v => set('restBetweenSets', v === '(空欄)' ? '' : v)} placeholder="（任意）"
          defaultItems={TMPL_REST_SETS} customItems={ct.restSets}
          onAddCustom={v => onAddCt('restSets', v)} onRemoveCustom={i => onRemoveCt('restSets', i)} />
      </div>

      <div>
        <label className="block text-xs text-gray-500 mb-0.5">備考</label>
        <input type="text" value={block.note} onChange={e => set('note', e.target.value)}
          className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-orange-200 outline-none" placeholder="（任意）" />
      </div>

      {preview !== '(未入力)' && (
        <div className="mt-2.5 px-3 py-1.5 bg-orange-50 border border-orange-200 rounded-lg text-xs text-orange-800 font-mono">
          → {preview}
        </div>
      )}
    </div>
  );
}

// ======================================================
// POINT VIEW
// ======================================================
const EMPTY_CT = { dist:[], reps:[], sets:[], target:[], restReps:[], restSets:[] };

function PointView({ common, onSave, onSaveSessionMeta, templates, onSaveTemplate, onUpdateTemplate, onDeleteTemplate, athletes, contentTags }) {
  const [sessionType, setSessionType] = useState('トラック');
  const [blocks, setBlocks]           = useState([newBlock(1)]);
  const [sessionMenu, setSessionMenu] = useState('');
  const [sessionNote, setSessionNote] = useState('');
  const [selected, setSelected]       = useState(new Set());
  const [menus, setMenus]             = useState({});
  const [warns, setWarns]             = useState([]);
  const [saved, setSaved]             = useState(false);
  const [tmplName, setTmplName]       = useState('');
  const [showTmpl, setShowTmpl]       = useState(false);
  const [loadedTmplIdx, setLoadedTmplIdx] = useState(null);
  const [ct, setCt]                   = useLS('ekiden_custom_tmpl', EMPTY_CT);
  const [menuHistory, setMenuHistory] = useLS('ekiden_session_menu_history', []);
  const [noteHistory, setNoteHistory] = useLS('ekiden_session_note_history', []);

  const addCt    = (field, v) => setCt(p => ({ ...p, [field]: [...(p[field]||[]), v] }));
  const removeCt = (field, i) => setCt(p => ({ ...p, [field]: p[field].filter((_,j) => j!==i) }));

  const updateBlock = (id, field, val) =>
    setBlocks(bs => bs.map(b => b.id === id ? { ...b, [field]: val } : b));
  const deleteBlock = id => setBlocks(bs => bs.filter(b => b.id !== id));
  const addBlock    = () => setBlocks(bs => [...bs, newBlock(bs.length + 1)]);

  const autoGenMenu = () => setSessionMenu(buildSessionMenu(blocks));

  const toggle = name => setSelected(prev => {
    const s = new Set(prev); s.has(name) ? s.delete(name) : s.add(name); return s;
  });
  const selectYear = y => {
    const names = athletes.filter(a => a.year === y).map(a => a.name);
    setSelected(prev => { const s = new Set(prev); names.forEach(n => s.add(n)); return s; });
  };

  const validateBlocks = () => {
    const w = [];
    blocks.forEach((b, i) => {
      if (!b.distanceM) w.push(`ブロック${i+1}: 距離mが未入力です`);
      if (!b.reps)      w.push(`ブロック${i+1}: 本数が未入力です`);
      if (parseInt(b.sets) === 0) w.push(`ブロック${i+1}: セット数は1以上にしてください`);
    });
    return w;
  };

  const addToAthletes = () => {
    if (selected.size === 0) { setWarns(['選手を1人以上選択してください。']); return; }
    const w = validateBlocks();
    const dups = [];
    const next = { ...menus };
    selected.forEach(name => {
      const entry = next[name] ? { ...next[name], blocks: [...next[name].blocks] }
                               : { sessionMenu, blocks: [], statusDiv: '通常' };
      entry.sessionMenu = sessionMenu;
      blocks.forEach(b => {
        const preview = buildPointMenu(b);
        if (entry.blocks.some(x => buildPointMenu(x) === preview)) {
          dups.push(`${name}に「${preview}」が既に登録されています`);
        } else {
          entry.blocks.push({ ...b, id: uid() });
        }
      });
      next[name] = entry;
    });
    setMenus(next);
    setWarns([...w, ...dups]);
    if (w.length === 0 && dups.length === 0) setSelected(new Set());
  };

  const deleteMenuBlock = (name, id) => {
    setMenus(prev => {
      const n = { ...prev };
      n[name] = { ...n[name], blocks: n[name].blocks.filter(b => b.id !== id) };
      if (!n[name].blocks.length) delete n[name];
      return n;
    });
  };
  const clearAthleteMenu = name => setMenus(prev => { const n={...prev}; delete n[name]; return n; });

  const handleSave = () => {
    const athletes_list = Object.keys(menus);
    if (!athletes_list.length) { setWarns(['登録済みメニューがありません。']); return; }
    const w = [];
    const dateMs = new Date(common.s.date).getTime(), nowMs = Date.now();
    if (dateMs > nowMs + 30*86400000)  w.push('日付が30日以上未来です。確認してください。');
    if (dateMs < nowMs - 365*86400000) w.push('日付が1年以上前です。確認してください。');
    const recs = [];
    athletes_list.forEach(name => {
      const ath = athletes.find(a => a.name === name);
      const { sessionMenu: sm, blocks: bs, statusDiv: sd } = menus[name];
      bs.forEach((b, i) => {
        recs.push({
          id: uid(), date: common.s.date, name, year: ath?.year || '', division: '',
          statusDiv: sd || '通常', practiceType: 'ポイント練習', sessionType,
          location: common.s.location, sessionName: common.s.sessionName || '朝練習', blockNo: i + 1,
          distanceM: b.distanceM !== '' ? parseInt(b.distanceM) : '',
          reps:      b.reps !== '' ? parseInt(b.reps) : '',
          sets:      parseInt(b.sets) || 1,
          target: b.target, restBetweenReps: b.restBetweenReps, restBetweenSets: b.restBetweenSets,
          pointDistanceKm: calcPointKm(b.distanceM, b.reps, b.sets),
          sessionMenu: sm, displayMenu: buildPointMenu(b), note: b.note,
          contentTag: '', distanceKm: '', durationMin: '',
        });
      });
    });
    setWarns(w);
    // セッションメタデータを保存
    if (onSaveSessionMeta) {
      onSaveSessionMeta(common.s.date, common.s.sessionName || '朝練習', {
        temperature: common.s.temperature, humidity: common.s.humidity,
        wind: common.s.wind, location: common.s.location,
        sessionNote: sessionNote,
      });
    }
    onSave(recs);
    // sessionMenuを履歴に追加（重複除去・最大15件）
    if (sessionMenu.trim()) {
      setMenuHistory(prev => {
        const filtered = prev.filter(v => v !== sessionMenu.trim());
        return [sessionMenu.trim(), ...filtered].slice(0, 15);
      });
    }
    // sessionNoteを履歴に追加（重複除去・最大10件）
    if (sessionNote.trim()) {
      setNoteHistory(prev => {
        const filtered = prev.filter(v => v !== sessionNote.trim());
        return [sessionNote.trim(), ...filtered].slice(0, 10);
      });
    }
    setSaved(true);
    setMenus({}); setBlocks([newBlock(1)]); setSessionMenu(''); setSessionNote('');
    setSelected(new Set()); setLoadedTmplIdx(null);
    setTimeout(() => setSaved(false), 3000);
  };

  const handleSaveTemplate = () => {
    if (!tmplName.trim()) return;
    const tmpl = {
      name: tmplName.trim(), sessionMenu,
      blocks: blocks.map((b, i) => ({ ...b, id: uid(), blockNo: i+1 }))
    };
    const existIdx = templates.findIndex(t => t.name === tmplName.trim());
    if (existIdx >= 0) {
      onUpdateTemplate(existIdx, tmpl);
    } else {
      onSaveTemplate(tmpl);
    }
    setTmplName(''); setShowTmpl(false); setLoadedTmplIdx(null);
  };

  const loadTemplate = (t, idx) => {
    setBlocks(t.blocks.map((b, j) => ({ ...b, id: uid(), blockNo: j+1 })));
    setSessionMenu(t.sessionMenu || '');
    setTmplName(t.name);
    setLoadedTmplIdx(idx);
    setShowTmpl(false);
  };

  const registeredNames = Object.keys(menus);
  const totalKm = registeredNames.length > 0
    ? (() => {
        const allBlocks = Object.values(menus).flatMap(e => e.blocks);
        const sum = allBlocks.reduce((a, b) => a + calcPointKm(b.distanceM, b.reps, b.sets), 0);
        return Math.round(sum * 10) / 10;
      })() : 0;

  return (
    <div>
      <CommonSettings s={common.s} onChange={common.onChange} contentTags={contentTags} />

      <div className="mb-3 bg-white border border-gray-200 rounded-lg p-3">
        <label className="block text-xs text-gray-500 mb-2 font-semibold">実施タイプ</label>
        <div className="flex gap-2 flex-wrap">
          {SESSION_TYPES.map(t => (
            <button key={t} type="button" onClick={() => setSessionType(t)}
              className={`px-4 py-1.5 rounded-full text-sm border font-medium transition-colors
                ${sessionType === t ? 'bg-orange-500 text-white border-orange-500 shadow-sm' : 'bg-white text-gray-600 border-gray-300 hover:bg-orange-50'}`}>
              {t}
            </button>
          ))}
        </div>
      </div>

      <Warnings warns={warns} onClose={() => setWarns([])} />

      {templates.length > 0 && (
        <div className="mb-3 p-3 bg-purple-50 border border-purple-200 rounded-lg">
          <div className="text-xs font-bold text-purple-700 mb-2">📌 保存済みテンプレート</div>
          <div className="space-y-1">
            {templates.map((t, i) => (
              <div key={i} className="flex items-center gap-2">
                <button type="button" onClick={() => loadTemplate(t, i)}
                  className={`flex-1 text-left px-3 py-1.5 text-xs rounded-lg border font-medium transition-colors
                    ${loadedTmplIdx === i ? 'bg-purple-200 border-purple-400 text-purple-900' : 'bg-white border-purple-300 text-purple-700 hover:bg-purple-100'}`}>
                  {t.name}
                  {t.sessionMenu && <span className="ml-1.5 text-purple-400 font-normal">{t.sessionMenu}</span>}
                </button>
                <button type="button" onClick={() => onDeleteTemplate(i)}
                  className="text-xs text-red-400 hover:text-red-600 px-1.5 py-1 rounded hover:bg-red-50 transition-colors flex-shrink-0">
                  削除
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="mb-3 bg-white border border-orange-200 rounded-xl p-3">
        <div className="flex items-center justify-between mb-1.5">
          <label className="text-xs font-bold text-gray-700">セッション表示名</label>
          <button type="button" onClick={autoGenMenu}
            className="text-xs text-blue-500 hover:text-blue-700 transition-colors">
            ブロックから自動生成 ↑
          </button>
        </div>
        <input type="text" value={sessionMenu} onChange={e => setSessionMenu(e.target.value)}
          placeholder="例: 1000m×5本+200m×5本  /  3000m変化走+2000m変化走+1000m  /  (400m+800m)×3セット"
          className="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-orange-200 outline-none" />
        {menuHistory.length > 0 && (
          <div className="mt-2">
            <div className="text-xs text-gray-400 mb-1">🕐 履歴から選択：</div>
            <div className="flex flex-wrap gap-1">
              {menuHistory.map((h, i) => (
                <span key={i} className="inline-flex items-center">
                  <button type="button"
                    onClick={() => setSessionMenu(h)}
                    className="tmpl-btn"
                    style={{background:'#fff7ed',borderColor:'#fed7aa',color:'#9a3412'}}>
                    {h}
                  </button>
                  <button type="button"
                    onClick={() => setMenuHistory(prev => prev.filter((_, j) => j !== i))}
                    className="text-red-400 hover:text-red-600 text-xs ml-0.5 leading-none">×</button>
                </span>
              ))}
            </div>
          </div>
        )}
        <p className="text-xs text-gray-400 mt-1">記録一覧・Sheetsに「セッション表示名」列として保存されます</p>
      </div>

      <div className="mb-3 bg-white border border-orange-200 rounded-xl p-3">
        <label className="block">
          <span className="block text-xs font-bold text-gray-700 mb-1">セッション備考（任意）</span>
          <textarea value={sessionNote} onChange={e => setSessionNote(e.target.value)}
            placeholder="例: 強度高め、天気注意など"
            rows="2"
            className="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-orange-200 outline-none" />
        </label>
        {noteHistory.length > 0 && (
          <div className="mt-2">
            <div className="text-xs text-gray-400 mb-1">🕐 履歴から選択：</div>
            <div className="flex flex-wrap gap-1">
              {noteHistory.map((h, i) => (
                <span key={i} className="inline-flex items-center">
                  <button type="button"
                    onClick={() => setSessionNote(h)}
                    className="tmpl-btn"
                    style={{background:'#fef3c7',borderColor:'#fcd34d',color:'#92400e'}}>
                    {h.length > 20 ? h.substring(0, 20) + '...' : h}
                  </button>
                  <button type="button"
                    onClick={() => setNoteHistory(prev => prev.filter((_, j) => j !== i))}
                    className="text-red-400 hover:text-red-600 text-xs ml-0.5 leading-none">×</button>
                </span>
              ))}
            </div>
          </div>
        )}
      </div>

      <div className="mb-1">
        <div className="flex items-center justify-between mb-2">
          <h3 className="text-sm font-bold text-gray-700">メニューブロック</h3>
          <span className="text-xs text-gray-400">{blocks.length} ブロック</span>
        </div>
        {blocks.map((b, i) => (
          <BlockCard key={b.id} block={b} idx={i} total={blocks.length}
            onChange={updateBlock} onDelete={deleteBlock}
            ct={ct} onAddCt={addCt} onRemoveCt={removeCt} />
        ))}
        <button type="button" onClick={addBlock}
          className="w-full py-2.5 border-2 border-dashed border-gray-300 rounded-xl text-sm text-gray-500 hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50/30 transition-colors">
          ＋ ブロック追加
        </button>
      </div>

      <div className="mt-2 mb-5">
        {!showTmpl ? (
          <div className="flex items-center gap-3">
            <button type="button" onClick={() => setShowTmpl(true)}
              className="text-xs text-purple-600 underline hover:text-purple-800 transition-colors">
              📥 テンプレ保存
            </button>
            {loadedTmplIdx !== null && (
              <button type="button" onClick={handleSaveTemplate}
                className="text-xs text-orange-600 underline hover:text-orange-800 transition-colors">
                🔄 「{tmplName}」を上書き更新
              </button>
            )}
          </div>
        ) : (
          <div className="flex gap-2 items-center mt-1">
            <input type="text" value={tmplName} onChange={e => setTmplName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSaveTemplate()}
              placeholder="テンプレート名（例: 1000×5+200×5）"
              className="border rounded px-2 py-1.5 text-sm flex-1 focus:ring-2 focus:ring-purple-200 outline-none" />
            <button type="button" onClick={handleSaveTemplate}
              className="px-3 py-1.5 text-sm bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors">保存</button>
            <button type="button" onClick={() => setShowTmpl(false)}
              className="px-3 py-1.5 text-sm text-gray-500 hover:text-gray-700 transition-colors">×</button>
          </div>
        )}
      </div>

      <div className="mb-4 p-3 bg-gray-50 border border-gray-200 rounded-xl">
        <h3 className="text-sm font-bold text-gray-700 mb-2">対象選手を選択</h3>
        <div className="flex flex-wrap gap-1.5 mb-2">
          {YEARS.map(y => (
            <button key={y} type="button" onClick={() => selectYear(y)}
              className="px-3 py-1 text-xs rounded-full border border-indigo-300 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 transition-colors font-medium">
              {y}全員
            </button>
          ))}
          <button type="button" onClick={() => setSelected(new Set())}
            className="px-3 py-1 text-xs rounded-full border border-gray-300 bg-white text-gray-500 hover:bg-gray-100 transition-colors">
            解除
          </button>
        </div>
        <div className="grid grid-cols-3 gap-1 sm:grid-cols-4 lg:grid-cols-5">
          {athletes.map(a => {
            const checked = selected.has(a.name);
            return (
              <label key={a.name}
                className={`flex items-center gap-1.5 px-2 py-1.5 rounded-lg border cursor-pointer text-xs transition-colors
                  ${checked ? 'bg-blue-50 border-blue-400 text-blue-800 font-medium' : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                <input type="checkbox" checked={checked} onChange={() => toggle(a.name)}
                  className="w-3 h-3 accent-blue-600 flex-shrink-0" />
                <span className="truncate">{a.name}</span>
              </label>
            );
          })}
        </div>
        <button type="button" onClick={addToAthletes} disabled={selected.size === 0}
          className="mt-3 px-5 py-2 bg-indigo-600 text-white rounded-lg text-sm font-semibold hover:bg-indigo-700 active:bg-indigo-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors shadow-sm">
          この選手に追加（{selected.size}名）
        </button>
      </div>

      {registeredNames.length > 0 && (
        <div className="mb-4 p-3 bg-green-50 border border-green-200 rounded-xl">
          <h3 className="text-sm font-bold text-green-800 mb-3">
            ✅ 登録済みメニュー（{registeredNames.length}名）
          </h3>
          <div className="space-y-2">
            {registeredNames.map(name => {
              const entry = menus[name];
              return (
                <div key={name} className="bg-white rounded-lg p-2.5 border border-green-100">
                  <div className="flex items-center justify-between mb-2">
                    <div>
                      <span className="text-xs font-bold text-gray-700">{name}</span>
                      {entry.sessionMenu && (
                        <span className="ml-2 text-xs font-medium text-orange-600 bg-orange-50 px-1.5 py-0.5 rounded">
                          {entry.sessionMenu}
                        </span>
                      )}
                    </div>
                    <button type="button" onClick={() => clearAthleteMenu(name)}
                      className="text-xs text-red-400 hover:text-red-600 transition-colors">全削除</button>
                  </div>
                  <div className="mb-2 pb-2 border-b border-green-100">
                    <label className="block text-xs text-gray-500 mb-1">状態区分</label>
                    <select value={entry.statusDiv || '通常'} onChange={e => {
                      setMenus(prev => ({
                        ...prev,
                        [name]: { ...prev[name], statusDiv: e.target.value }
                      }));
                    }}
                      className="w-full border rounded px-2 py-1 text-xs focus:ring-2 focus:ring-blue-200 outline-none">
                      {STATUS_DIVS.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </div>
                  <div className="space-y-0.5 ml-1">
                    {entry.blocks.map((b, bi) => (
                      <div key={b.id} className="flex items-center gap-2">
                        <span className="text-xs text-gray-400 w-5 flex-shrink-0">#{bi+1}</span>
                        <span className="text-xs text-gray-600 font-mono flex-1">{buildPointMenu(b)}</span>
                        <span className="text-xs text-blue-400">{calcPointKm(b.distanceM, b.reps, b.sets)}km</span>
                        <button type="button" onClick={() => deleteMenuBlock(name, b.id)}
                          className="text-xs text-red-400 hover:text-red-600 transition-colors">削除</button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="flex items-center gap-3">
        <button type="button" onClick={handleSave} disabled={registeredNames.length === 0}
          className="px-6 py-2.5 bg-blue-600 text-white rounded-lg font-semibold text-sm hover:bg-blue-700 active:bg-blue-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors shadow-sm">
          保存（{registeredNames.length}名分）
        </button>
        <SavedToast show={saved} />
      </div>
    </div>
  );
}

// ======================================================
// RECORDS VIEW - 入力状況チェックリスト付き
// ======================================================
function RecordsView({ records, onDelete, onDeleteAll, onResend, scriptUrl, athletes, onUpdateRecord, failedRecords, onRetryFailed, myName, sessionMeta, onRecordPdfExport }) {
  const [fDate, setFDate]   = useState(today());
  const [fName, setFName]   = useState('');
  const [fType, setFType]   = useState('');
  const [fYear, setFYear]   = useState('全員');
  const [editingRecord, setEditingRecord] = useState(null);
  const [selectedAthlete, setSelectedAthlete] = useState(new Set());
  const [bulkStatusDiv, setBulkStatusDiv] = useState('');
  const [checkedIds, setCheckedIds] = useState(new Set());
  const [rowBulkStatusDiv, setRowBulkStatusDiv] = useState('');
  const [showSessionDisplay, setShowSessionDisplay] = useState(false);
  const [displaySessionName, setDisplaySessionName] = useState('');
  const [showSessionModal, setShowSessionModal] = useState(false);
  const [inputStatusSession, setInputStatusSession] = useState('朝練習');

  const shown = records.filter(r => {
    if (myName && r.name !== myName) return false;
    if (fDate && r.date !== fDate) return false;
    if (fName && !r.name.includes(fName)) return false;
    if (fType && r.practiceType !== fType) return false;
    if (fYear !== '全員' && r.year !== fYear) return false;
    return true;
  });

  // PDF用: フィルタ中の日付に含まれるセッション一覧
  const filteredSessions = fDate
    ? [...new Set(shown.map(r => r.sessionName).filter(Boolean))]
    : [];
  if (fDate && filteredSessions.length === 0) filteredSessions.push('朝練習');

  const handleShowSession = (sessionName) => {
    setShowSessionModal(false);
    setDisplaySessionName(sessionName);
    setShowSessionDisplay(true);
  };

  // 機能7: 一括状態区分変更
  const handleRowBulkStatusChange = () => {
    if (!rowBulkStatusDiv || checkedIds.size === 0) return;
    checkedIds.forEach(id => {
      const rec = records.find(r => r.id === id);
      if (rec) onUpdateRecord({ ...rec, statusDiv: rowBulkStatusDiv });
    });
    setCheckedIds(new Set());
    setRowBulkStatusDiv('');
  };

  const toggleCheck = (id, e) => {
    e.stopPropagation();
    setCheckedIds(prev => {
      const s = new Set(prev);
      s.has(id) ? s.delete(id) : s.add(id);
      return s;
    });
  };

  const inputStatus = {};
  athletes.forEach(a => {
    inputStatus[a.name] = records.some(r => r.name === a.name && r.date === (fDate || today()) && ((r.sessionName || '朝練習') === inputStatusSession));
  });

  const handleBulkStatusChange = () => {
    if (!bulkStatusDiv || selectedAthlete.size === 0) return;
    const newRecs = records.map(r => {
      if (selectedAthlete.has(r.name) && r.date === (fDate || today())) {
        return { ...r, statusDiv: bulkStatusDiv };
      }
      return r;
    });
    setSelectedAthlete(new Set());
    setBulkStatusDiv('');
  };

  const dl = () => downloadCSV(shown, `ekiden_${new Date().toISOString().slice(0,10)}.csv`);

  const statusColor = s =>
    s === '通常' ? 'bg-green-100 text-green-700' :
    s === '故障' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700';

  const typeColor = t => t === 'ジョグ・各自' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700';

  return (
    <div>
      {/* 送信失敗警告 */}
      {failedRecords.length > 0 && (
        <div className="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
          <div className="flex items-center justify-between">
            <div>
              <div className="text-sm font-bold text-red-800 mb-1">⚠️ Sheets送信失敗（{failedRecords.length}件）</div>
              <div className="text-xs text-red-600">ネット接続を確認して再送信してください</div>
            </div>
            {scriptUrl && (
              <button type="button" onClick={() => onRetryFailed(failedRecords)}
                className="px-4 py-2 bg-red-600 text-white text-sm rounded-lg hover:bg-red-700 transition-colors flex-shrink-0 ml-3">
                🔄 失敗分を再送
              </button>
            )}
          </div>
        </div>
      )}

      {/* 入力状況チェックリスト */}
      {fDate && (
        <div className="mb-4 p-3 bg-indigo-50 border border-indigo-200 rounded-xl">
          <div className="flex items-center gap-2 mb-3">
            <h3 className="text-sm font-bold text-indigo-800">📋 入力状況（{fDate}）</h3>
            <div className="flex gap-1 ml-auto">
              {['朝練習', '本練習'].map(session => (
                <button key={session} type="button" onClick={() => setInputStatusSession(session)}
                  className={`px-3 py-1 text-xs rounded-lg font-medium transition-colors border
                    ${inputStatusSession === session ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-100'}`}>
                  {session}
                </button>
              ))}
            </div>
          </div>
          <div className="grid grid-cols-2 gap-1 sm:grid-cols-3 lg:grid-cols-4 mb-3">
            {athletes.map(a => {
              const done = inputStatus[a.name];
              const checked = selectedAthlete.has(a.name);
              return (
                <label key={a.name}
                  className={`flex items-center gap-2 px-2 py-1.5 rounded-lg border cursor-pointer text-xs transition-colors
                    ${checked ? 'bg-blue-100 border-blue-400 text-blue-800' : done ? 'bg-green-50 border-green-200 text-gray-600' : 'bg-red-50 border-red-200 text-gray-600'}`}>
                  <input type="checkbox" checked={checked} onChange={() => {
                    const s = new Set(selectedAthlete);
                    checked ? s.delete(a.name) : s.add(a.name);
                    setSelectedAthlete(s);
                  }} className="w-3 h-3 accent-blue-600 flex-shrink-0" />
                  <span className="truncate font-medium">{a.name}</span>
                  <span className="text-xs ml-auto">{done ? '✅' : '❌'}</span>
                </label>
              );
            })}
          </div>
          {selectedAthlete.size > 0 && (
            <div className="flex gap-2 items-center">
              <select value={bulkStatusDiv} onChange={e => setBulkStatusDiv(e.target.value)}
                className="flex-1 border rounded px-2 py-1.5 text-xs focus:ring-2 focus:ring-indigo-300 outline-none">
                <option value="">状態区分を選択</option>
                {STATUS_DIVS.map(s => <option key={s}>{s}</option>)}
              </select>
              <button type="button" onClick={handleBulkStatusChange} disabled={!bulkStatusDiv}
                className="px-3 py-1.5 bg-indigo-600 text-white text-xs rounded-lg hover:bg-indigo-700 disabled:opacity-40 transition-colors">
                {selectedAthlete.size}人を一括変更
              </button>
            </div>
          )}
        </div>
      )}

      {/* Filters */}
      <div className="grid grid-cols-2 gap-2 sm:grid-cols-3 mb-2">
        <label className="block">
          <span className="block text-xs text-gray-500 mb-1">日付</span>
          <div className="flex items-center">
            <input type="date" value={fDate} onChange={e => setFDate(e.target.value)}
              className="flex-1 border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-200 outline-none" />
            {fDate && (
              <button type="button" onClick={() => setFDate('')}
                className="ml-1 px-2 py-1 text-sm text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded transition-colors"
                title="日付フィルタをクリア">
                ×
              </button>
            )}
          </div>
        </label>
        {!myName && (
          <label className="block">
            <span className="block text-xs text-gray-500 mb-1">選手名</span>
            <input type="text" value={fName} onChange={e => setFName(e.target.value)}
              className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-200 outline-none" placeholder="名前で絞込" />
          </label>
        )}
        <label className="block">
          <span className="block text-xs text-gray-500 mb-1">練習タイプ</span>
          <select value={fType} onChange={e => setFType(e.target.value)}
            className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-200 outline-none">
            <option value="">すべて</option>
            <option>ジョグ・各自</option>
            <option>ポイント練習</option>
          </select>
        </label>
      </div>
      {/* 学年フィルター（マネージャーモードのみ） */}
      {!myName && (
        <div className="flex flex-wrap gap-2 mb-4 items-center">
          <span className="text-xs text-gray-500 font-medium">学年:</span>
          {['全員', ...YEARS].map(y => (
            <button key={y} type="button" onClick={() => setFYear(y)}
              className={`px-3 py-1 text-xs rounded-full border transition-colors font-medium
                ${fYear === y ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>
              {y}
            </button>
          ))}
        </div>
      )}

      <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
        <span className="text-sm text-gray-600">
          表示 <strong>{shown.length}</strong> 件 / 全 <strong>{records.length}</strong> 件
        </span>
        <div className="flex gap-2">
          <button type="button" onClick={dl} disabled={shown.length === 0}
            className="px-4 py-1.5 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors shadow-sm">
            ⬇ CSV
          </button>
          {fDate && shown.length > 0 && (
            <button type="button" onClick={() => setShowSessionModal(true)}
              className="px-4 py-1.5 bg-orange-600 text-white text-sm rounded-lg hover:bg-orange-700 transition-colors shadow-sm">
              📋 セッション表示
            </button>
          )}
          {scriptUrl && (
            <button type="button" onClick={() => onResend(shown)} disabled={shown.length === 0}
              className="px-4 py-1.5 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors shadow-sm">
              📤 Sheetsに再送信
            </button>
          )}
          {records.length > 0 && (
            <button type="button"
              onClick={() => { if (window.confirm('全記録を削除しますか？この操作は元に戻せません。')) onDeleteAll(); }}
              className="px-4 py-1.5 bg-red-100 text-red-600 text-sm rounded-lg hover:bg-red-200 transition-colors">
              全削除
            </button>
          )}
        </div>
      </div>

      {/* 機能7: 選択中バー */}
      {checkedIds.size > 0 && (
        <div className="mb-3 p-2 bg-indigo-50 border border-indigo-200 rounded-lg flex flex-wrap gap-2 items-center">
          <span className="text-xs font-semibold text-indigo-800">選択中 {checkedIds.size} 件の状態区分を変更：</span>
          <select value={rowBulkStatusDiv} onChange={e => setRowBulkStatusDiv(e.target.value)}
            className="border rounded px-2 py-1 text-xs focus:ring-2 focus:ring-indigo-300 outline-none">
            <option value="">選択してください</option>
            {STATUS_DIVS.map(s => <option key={s}>{s}</option>)}
          </select>
          <button type="button" onClick={handleRowBulkStatusChange} disabled={!rowBulkStatusDiv}
            className="px-3 py-1 bg-indigo-600 text-white text-xs rounded-lg hover:bg-indigo-700 disabled:opacity-40 transition-colors">
            変更
          </button>
          <button type="button" onClick={() => setCheckedIds(new Set())}
            className="px-3 py-1 text-xs text-gray-500 hover:text-gray-700 transition-colors">
            解除
          </button>
        </div>
      )}

      {shown.length === 0 ? (
        <div className="text-center py-16 text-gray-400">
          <div className="text-4xl mb-3">📋</div>
          <div className="text-sm">記録がありません</div>
        </div>
      ) : (
        <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm bg-white">
          <table className="w-full text-xs min-w-[700px]">
            <thead className="bg-gray-50 border-b border-gray-200">
              <tr>
                <th className="px-2 py-2.5 text-left text-gray-500 font-semibold whitespace-nowrap w-6"></th>
                {['日付','氏名','学年','状態','タイプ','実施','場所','メニュー表示','距離','備考',''].map(h => (
                  <th key={h} className="px-2 py-2.5 text-left text-gray-500 font-semibold whitespace-nowrap">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {shown.map(r => (
                <tr key={r.id} className="hover:bg-blue-50/40 transition-colors cursor-pointer" onClick={() => setEditingRecord({...r})}>
                  <td className="px-2 py-2" onClick={e => e.stopPropagation()}>
                    {/* 機能7: チェックボックス */}
                    <input type="checkbox" checked={checkedIds.has(r.id)}
                      onChange={e => toggleCheck(r.id, e)}
                      className="w-3 h-3 accent-indigo-600" />
                  </td>
                  <td className="px-2 py-2 whitespace-nowrap font-mono">{r.date}</td>
                  <td className="px-2 py-2 whitespace-nowrap font-medium text-gray-800">{r.name}</td>
                  <td className="px-2 py-2 whitespace-nowrap text-gray-600">{r.year}</td>
                  <td className="px-2 py-2 whitespace-nowrap">
                    <span className={`px-1.5 py-0.5 rounded text-xs font-medium ${statusColor(r.statusDiv)}`}>{r.statusDiv}</span>
                  </td>
                  <td className="px-2 py-2 whitespace-nowrap">
                    <span className={`px-1.5 py-0.5 rounded text-xs font-medium ${typeColor(r.practiceType)}`}>
                      {r.practiceType === 'ジョグ・各自' ? 'ジョグ' : 'ポイント'}
                    </span>
                  </td>
                  <td className="px-2 py-2 whitespace-nowrap text-gray-600">{r.sessionType || '—'}</td>
                  <td className="px-2 py-2 whitespace-nowrap text-gray-600">{r.location}</td>
                  <td className="px-2 py-2 font-mono text-gray-800 max-w-xs truncate" title={r.displayMenu}>{r.displayMenu}</td>
                  <td className="px-2 py-2 whitespace-nowrap text-gray-600 text-right">
                    {r.practiceType === 'ジョグ・各自'
                      ? (r.distanceKm !== '' ? `${r.distanceKm}km` : '')
                      : (r.pointDistanceKm ? `${r.pointDistanceKm}km` : '')}
                  </td>
                  <td className="px-2 py-2 text-gray-500 max-w-[100px] truncate" title={r.note}>{r.note}</td>
                  <td className="px-2 py-2" onClick={e => e.stopPropagation()}>
                    {/* 機能3: 削除確認ダイアログ */}
                    <button type="button" onClick={() => {
                      if (window.confirm('この記録を削除しますか？')) onDelete(r.id);
                    }}
                      className="text-red-400 hover:text-red-600 transition-colors w-5 h-5 flex items-center justify-center rounded hover:bg-red-50">
                      ×
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* セッション選択モーダル */}
      {showSessionModal && fDate && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowSessionModal(false)}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <h2 className="text-base font-bold text-gray-800 mb-4">📋 セッション選択</h2>
            <p className="text-sm text-gray-600 mb-4">表示するセッションを選択してください</p>
            {filteredSessions.length === 0 ? (
              <p className="text-xs text-gray-500 mb-4">この日付のセッションはありません</p>
            ) : (
              <div className="space-y-2 mb-4">
                {filteredSessions.map(s => (
                  <button key={s} type="button" onClick={() => handleShowSession(s)}
                    className="w-full px-4 py-2.5 bg-orange-50 border border-orange-200 text-orange-700 rounded-lg hover:bg-orange-100 transition-colors text-sm font-medium">
                    {s}
                  </button>
                ))}
              </div>
            )}
            <button onClick={() => setShowSessionModal(false)}
              className="w-full px-4 py-2 text-sm text-gray-500 hover:text-gray-700">
              キャンセル
            </button>
          </div>
        </div>
      )}

      {/* セッション表示パネル（スクショ用） */}
      {showSessionDisplay && fDate && displaySessionName && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowSessionDisplay(false)}>
          <div className="bg-white rounded-xl shadow-2xl max-h-[90vh] overflow-y-auto p-6 w-full max-w-4xl">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-lg font-bold text-gray-800">📋 セッション表示</h2>
              <button onClick={() => setShowSessionDisplay(false)} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
            </div>
            {(() => {
              const metaKey = `${fDate}_${displaySessionName}`;
              const meta = (sessionMeta && sessionMeta[metaKey]) || {};
              const sessionRecords = shown.filter(r =>
                r.date === fDate && ((r.sessionName || '朝練習') === displaySessionName)
              );
              const yOrder = { '4年': 0, '3年': 1, '2年': 2, '1年': 3 };
              const seenNames = new Set();
              const unique = sessionRecords.filter(r => {
                if (seenNames.has(r.name)) return false;
                seenNames.add(r.name);
                return true;
              });
              const sorted = [...unique].sort((a, b) => {
                if (yOrder[a.year] !== yOrder[b.year]) return (yOrder[a.year] ?? 9) - (yOrder[b.year] ?? 9);
                return a.name.localeCompare(b.name, 'ja');
              });
              const temp = (meta.temperature !== undefined && meta.temperature !== '') ? meta.temperature + '℃' : '—';
              const hum = (meta.humidity !== undefined && meta.humidity !== '') ? meta.humidity + '%' : '—';
              const wind = meta.wind || '—';
              const loc = meta.location || '—';
              return (
                <>
                  <div className="text-center mb-6">
                    <h3 className="text-2xl font-bold text-gray-800 mb-3">{fDate}（{displaySessionName}）練習記録</h3>
                    <div className="flex gap-6 justify-center flex-wrap text-sm text-gray-600 mb-2">
                      <span>📍 {loc}</span>
                      <span>🌡 {temp}</span>
                      <span>💧 {hum}</span>
                      <span>💨 {wind}</span>
                    </div>
                  </div>
                  {sorted.length === 0 ? (
                    <div className="text-center py-8 text-gray-400">記録がありません</div>
                  ) : (
                    <div className="overflow-x-auto rounded-lg border border-gray-200 bg-white">
                      <table className="w-full text-sm">
                        <thead className="bg-gray-100 border-b border-gray-200">
                          <tr>
                            <th className="px-4 py-2.5 text-left font-semibold text-gray-700">名前</th>
                            <th className="px-4 py-2.5 text-right font-semibold text-gray-700">距離 (km)</th>
                            <th className="px-4 py-2.5 text-right font-semibold text-gray-700">時間 (分)</th>
                            <th className="px-4 py-2.5 text-left font-semibold text-gray-700">セクション</th>
                            <th className="px-4 py-2.5 text-left font-semibold text-gray-700">備考</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {sorted.map((r, i) => {
                            const isInjured = r.statusDiv === '故障';
                            const dist = r.practiceType === 'ジョグ・各自'
                              ? (r.distanceKm !== '' && r.distanceKm !== undefined ? `${r.distanceKm}km` : '—') : '—';
                            const time = r.practiceType === 'ジョグ・各自'
                              ? (r.durationMin !== '' && r.durationMin !== undefined ? `${r.durationMin}分` : '—') : '—';
                            const section = r.practiceType === 'ポイント練習'
                              ? (r.sessionMenu || r.displayMenu || '—') : '—';
                            const note = r.practiceType === 'ジョグ・各自' ? (r.note || '') : (meta.sessionNote || '');
                            return (
                              <tr key={r.name} className={isInjured ? 'bg-red-50' : (i % 2 === 0 ? 'bg-white' : 'bg-gray-50')}>
                                <td className={`px-4 py-2.5 font-medium ${isInjured ? 'text-red-600 font-bold' : 'text-gray-800'}`}>
                                  {r.year} {r.name}{isInjured ? ' ★故障' : ''}
                                </td>
                                <td className="px-4 py-2.5 text-right text-gray-700">{dist}</td>
                                <td className="px-4 py-2.5 text-right text-gray-700">{time}</td>
                                <td className="px-4 py-2.5 text-gray-700">{section}</td>
                                <td className="px-4 py-2.5 text-gray-700">{note}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}
                  <div className="mt-6 text-center text-xs text-gray-400">
                    💡 このページをスクショして共有してください
                  </div>
                </>
              );
            })()}
          </div>
        </div>
      )}

      {/* 編集モーダル */}
      {editingRecord && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setEditingRecord(null)}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-5 max-h-96 overflow-y-auto">
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-base font-bold text-gray-800">📝 記録を編集</h2>
              <button type="button" onClick={() => setEditingRecord(null)} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
            </div>

            <div className="space-y-3">
              <label className="block">
                <span className="text-xs text-gray-500 mb-1 block font-semibold">日付</span>
                <input type="date" value={editingRecord.date} onChange={e => setEditingRecord({...editingRecord, date: e.target.value})}
                  className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
              </label>

              <label className="block">
                <span className="text-xs text-gray-500 mb-1 block font-semibold">状態区分</span>
                <select value={editingRecord.statusDiv} onChange={e => setEditingRecord({...editingRecord, statusDiv: e.target.value})}
                  className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                  {STATUS_DIVS.map(s => <option key={s}>{s}</option>)}
                </select>
              </label>

              <label className="block">
                <span className="text-xs text-gray-500 mb-1 block font-semibold">場所</span>
                <input type="text" value={editingRecord.location} onChange={e => setEditingRecord({...editingRecord, location: e.target.value})}
                  className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
              </label>

              {editingRecord.practiceType === 'ジョグ・各自' && (
                <>
                  <label className="block">
                    <span className="text-xs text-gray-500 mb-1 block font-semibold">距離 km</span>
                    <input type="number" step="0.1" value={editingRecord.distanceKm || ''} onChange={e => setEditingRecord({...editingRecord, distanceKm: e.target.value})}
                      className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
                  </label>
                  <label className="block">
                    <span className="text-xs text-gray-500 mb-1 block font-semibold">時間 分</span>
                    <input type="number" step="1" value={editingRecord.durationMin || ''} onChange={e => setEditingRecord({...editingRecord, durationMin: e.target.value})}
                      className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
                  </label>
                </>
              )}

              {editingRecord.practiceType === 'ポイント練習' && (
                <>
                  <label className="block">
                    <span className="text-xs text-gray-500 mb-1 block font-semibold">距離 m</span>
                    <input type="number" value={editingRecord.distanceM || ''} onChange={e => setEditingRecord({...editingRecord, distanceM: e.target.value})}
                      className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
                  </label>
                  <label className="block">
                    <span className="text-xs text-gray-500 mb-1 block font-semibold">本数</span>
                    <input type="number" value={editingRecord.reps || ''} onChange={e => setEditingRecord({...editingRecord, reps: e.target.value})}
                      className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
                  </label>
                  <label className="block">
                    <span className="text-xs text-gray-500 mb-1 block font-semibold">セット数</span>
                    <input type="number" min="1" value={editingRecord.sets || ''} onChange={e => setEditingRecord({...editingRecord, sets: e.target.value})}
                      className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
                  </label>
                  <label className="block">
                    <span className="text-xs text-gray-500 mb-1 block font-semibold">設定</span>
                    <input type="text" value={editingRecord.target || ''} onChange={e => setEditingRecord({...editingRecord, target: e.target.value})}
                      className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" placeholder="例: 3'10&quot;" />
                  </label>
                  <label className="block">
                    <span className="text-xs text-gray-500 mb-1 block font-semibold">本数間レスト</span>
                    <input type="text" value={editingRecord.restBetweenReps || ''} onChange={e => setEditingRecord({...editingRecord, restBetweenReps: e.target.value})}
                      className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" placeholder="例: R=2'00&quot;" />
                  </label>
                  <label className="block">
                    <span className="text-xs text-gray-500 mb-1 block font-semibold">セット間レスト</span>
                    <input type="text" value={editingRecord.restBetweenSets || ''} onChange={e => setEditingRecord({...editingRecord, restBetweenSets: e.target.value})}
                      className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" placeholder="（任意）" />
                  </label>
                </>
              )}

              <label className="block">
                <span className="text-xs text-gray-500 mb-1 block font-semibold">備考</span>
                <input type="text" value={editingRecord.note || ''} onChange={e => setEditingRecord({...editingRecord, note: e.target.value})}
                  className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
              </label>
            </div>

            <div className="flex gap-2 justify-end mt-5">
              <button type="button" onClick={() => setEditingRecord(null)}
                className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 transition-colors">キャンセル</button>
              <button type="button" onClick={() => {
                let rec = { ...editingRecord };
                // 機能1: ポイント練習の場合にdisplayMenuとpointDistanceKmを再計算
                if (rec.practiceType === 'ポイント練習') {
                  rec.displayMenu = buildPointMenu({
                    distanceM: rec.distanceM,
                    reps: rec.reps,
                    sets: rec.sets,
                    target: rec.target,
                    restBetweenReps: rec.restBetweenReps,
                    restBetweenSets: rec.restBetweenSets,
                  });
                  rec.pointDistanceKm = calcPointKm(rec.distanceM, rec.reps, rec.sets);
                }
                onUpdateRecord(rec);
                setEditingRecord(null);
              }}
                className="px-5 py-2 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
                保存
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ======================================================
// ADMIN VIEW
// ======================================================
function AdminView({ athletes, onAddAthlete, onDeleteAthlete, templates, onSaveTemplate, onUpdateTemplate, onDeleteTemplate, contentTags, onAddContentTag, onDeleteContentTag, records, onImport, isAthlete, editingTemplateIdx, setEditingTemplateIdx, editTmplName, setEditTmplName, editTmplMenu, setEditTmplMenu }) {
  const [newName, setNewName] = useState('');
  const [newYear, setNewYear] = useState('1年');
  const [newTag, setNewTag] = useState('');
  const [selectedYearChange, setSelectedYearChange] = useState(new Set());
  const [newYearForChange, setNewYearForChange] = useState('1年');

  const handleAddAthlete = () => {
    if (!newName.trim()) return;
    if (!window.confirm(`${newName.trim()}を${newYear}として追加してよろしいですか？`)) return;
    onAddAthlete({ name: newName.trim(), year: newYear });
    setNewName('');
  };

  const handleBulkYearChange = () => {
    if (selectedYearChange.size === 0 || !newYearForChange) return;
    const names = Array.from(selectedYearChange).join('、');
    if (!window.confirm(`${names}を${newYearForChange}に変更してよろしいですか？`)) return;
    selectedYearChange.forEach(name => {
      const idx = athletes.findIndex(a => a.name === name);
      if (idx >= 0) {
        onUpdateAthlete(idx, { ...athletes[idx], year: newYearForChange });
      }
    });
    setSelectedYearChange(new Set());
  };

  const onUpdateAthlete = (idx, ath) => {
    onDeleteAthlete(idx);
    onAddAthlete(ath);
  };

  return (
    <div className="space-y-4">
      {/* 選手管理 */}
      <div className="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
        <h3 className="text-sm font-bold text-gray-700 mb-3">👥 選手管理</h3>
        {!isAthlete && (
          <div className="flex gap-2 mb-3">
            <input type="text" value={newName} onChange={e => setNewName(e.target.value)}
              placeholder="選手名" onKeyDown={e => e.key === 'Enter' && handleAddAthlete()}
              className="flex-1 border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
            <select value={newYear} onChange={e => setNewYear(e.target.value)}
              className="border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none">
              {YEARS.map(y => <option key={y}>{y}</option>)}
            </select>
            <button type="button" onClick={handleAddAthlete}
              className="px-4 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition-colors">
              追加
            </button>
          </div>
        )}

        <div className="mb-3">
          <h4 className="text-xs font-semibold text-gray-600 mb-2">選手一覧（学年別）</h4>
          <div className="space-y-2 max-h-48 overflow-y-auto">
            {YEARS.map(y => {
              const yAth = athletes.filter(a => a.year === y).sort((a, b) => a.name.localeCompare(b.name, 'ja'));
              if (yAth.length === 0) return null;
              return (
                <div key={y}>
                  <div className="text-xs font-bold text-gray-600 mb-1">{y}</div>
                  <div className="grid grid-cols-2 gap-1 sm:grid-cols-3">
                    {yAth.map(a => (
                      <div key={a.name} className="flex items-center gap-1 px-2 py-1 bg-gray-50 border border-gray-200 rounded text-xs">
                        <input type="checkbox" onChange={e => {
                          const s = new Set(selectedYearChange);
                          e.target.checked ? s.add(a.name) : s.delete(a.name);
                          setSelectedYearChange(s);
                        }} className="w-3 h-3 flex-shrink-0" />
                        <span className="flex-1 truncate">{a.name}</span>
                        {!isAthlete && (
                          <button type="button" onClick={() => {
                            if (!window.confirm(`${a.name}を削除してよろしいですか？`)) return;
                            const idx = athletes.findIndex(x => x.name === a.name);
                            onDeleteAthlete(idx);
                          }} className="text-red-400 hover:text-red-600 text-xs leading-none">×</button>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {selectedYearChange.size > 0 && (
          <div className="flex gap-2 items-center p-2 bg-blue-50 border border-blue-200 rounded">
            <select value={newYearForChange} onChange={e => setNewYearForChange(e.target.value)}
              className="border rounded px-2 py-1 text-xs focus:ring-1 focus:ring-blue-300 outline-none">
              {YEARS.map(y => <option key={y}>{y}</option>)}
            </select>
            <button type="button" onClick={handleBulkYearChange}
              className="px-3 py-1 bg-indigo-600 text-white text-xs rounded hover:bg-indigo-700 transition-colors">
              選択した{selectedYearChange.size}人を変更
            </button>
          </div>
        )}
      </div>

      {/* テンプレ管理 */}
      <div className="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
        <h3 className="text-sm font-bold text-gray-700 mb-3">⚡ テンプレ管理</h3>
        {templates.length === 0 ? (
          <p className="text-xs text-gray-500">保存済みテンプレートはありません</p>
        ) : (
          <div className="space-y-1 max-h-48 overflow-y-auto">
            {templates.map((t, i) => (
              <div key={i} className="flex items-center justify-between px-2 py-2 bg-gray-50 border border-gray-200 rounded hover:bg-gray-100 transition-colors">
                <button type="button" onClick={() => {
                  setEditingTemplateIdx(i);
                  setEditTmplName(t.name);
                  setEditTmplMenu(t.sessionMenu || '');
                }} className="flex-1 text-left cursor-pointer">
                  <div className="text-xs">
                    <div className="font-medium text-gray-700">{t.name}</div>
                    {t.sessionMenu && <div className="text-gray-500 text-xs">{t.sessionMenu}</div>}
                  </div>
                </button>
                {!isAthlete && (
                  <button type="button" onClick={() => {
                    if (!window.confirm(`テンプレ「${t.name}」を削除してよろしいですか？`)) return;
                    onDeleteTemplate(i);
                  }}
                    className="text-red-400 hover:text-red-600 text-xs px-2 py-1 rounded hover:bg-red-50">削除</button>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* 機能8: データ管理 */}
      <div className="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
        <h3 className="text-sm font-bold text-gray-700 mb-3">💾 データ管理</h3>
        <div className="flex flex-wrap gap-3 items-center">
          <button type="button" onClick={() => {
            const data = { records, templates, athletes, contentTags };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ekiden-backup-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
          }}
            className="px-4 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 transition-colors shadow-sm font-medium">
            ⬇ JSONでエクスポート
          </button>
          <label className="px-4 py-2 bg-orange-500 text-white text-sm rounded-lg hover:bg-orange-600 transition-colors shadow-sm font-medium cursor-pointer">
            ⬆ JSONからインポート
            <input type="file" accept=".json" className="hidden" onChange={e => {
              const file = e.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = ev => {
                try {
                  const data = JSON.parse(ev.target.result);
                  if (!window.confirm('現在のデータを上書きします。よろしいですか？')) return;
                  onImport(data);
                  const total = (data.records || []).length;
                  alert(`インポート完了（${total}件）`);
                } catch {
                  alert('JSONの読み込みに失敗しました。ファイルを確認してください。');
                }
              };
              reader.readAsText(file);
              e.target.value = '';
            }} />
          </label>
        </div>
        <p className="text-xs text-gray-400 mt-2">エクスポート：records・templates・athletes・contentTagsを1ファイルに保存。インポート：既存データを上書きします。</p>
      </div>

      {/* タグ管理 */}
      <div className="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
        <h3 className="text-sm font-bold text-gray-700 mb-3">🏷️ 内容タグ管理</h3>
        <div className="flex gap-2 mb-3">
          <input type="text" value={newTag} onChange={e => setNewTag(e.target.value)}
            placeholder="タグ名（例: 各自、集団走）" onKeyDown={e => {
              if (e.key === 'Enter' && newTag.trim()) {
                onAddContentTag(newTag.trim());
                setNewTag('');
              }
            }}
            className="flex-1 border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
          <button type="button" onClick={() => {
            if (newTag.trim()) {
              onAddContentTag(newTag.trim());
              setNewTag('');
            }
          }}
            className="px-4 py-1.5 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition-colors">
            追加
          </button>
        </div>

        <div className="flex flex-wrap gap-1">
          {contentTags.map((t, i) => (
            <div key={i} className="inline-flex items-center gap-1 px-2 py-1 bg-blue-50 border border-blue-200 rounded text-xs">
              <span className="font-medium text-blue-700">{t}</span>
              {!isAthlete && (
                <button type="button" onClick={() => {
                  if (!window.confirm(`タグ「${t}」を削除してよろしいですか？`)) return;
                  onDeleteContentTag(i);
                }}
                  className="text-red-400 hover:text-red-600 text-xs leading-none">×</button>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
