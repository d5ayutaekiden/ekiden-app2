<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>女子駅伝部 練習記録</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%); }
    .tmpl-btn { font-size: 11px; padding: 2px 7px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
    .tmpl-btn:hover { background: #e0f2fe; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    .tab-active { border-bottom: 3px solid #a52a2a; color: #a52a2a; background: linear-gradient(180deg, rgba(165, 42, 42, 0.05) 0%, transparent 100%); font-weight: 600; }
    .tab-inactive { border-bottom: 3px solid transparent; color: #999; transition: all 0.2s; }
    .tab-inactive:hover { color: #666; }
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem; }
    .sync-toast { position:fixed;bottom:1.25rem;right:1rem;z-index:60;padding:.6rem 1rem;border-radius:.75rem;font-size:.8rem;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideUp .25s ease; }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ======================================================
// CONSTANTS
// ======================================================
const YEARS = ['4年', '3年', '2年', '1年'];
const STATUS_DIVS  = ['通常', '故障', '復帰', '体調不良', '特記事項', '未入力'];
const SESSION_TYPES = ['トラック', 'ロード', 'クロカン'];
const SESSION_NAMES = ['朝練習', '本練習'];

const TMPL_DIST      = [200, 300, 400, 600, 800, 1000, 1200, 1600, 2000, 3000];
const TMPL_REPS      = [1, 2, 3, 4, 5, 6, 8, 10, 12, 15, 20];
const TMPL_SETS      = [1, 2, 3, 4];
const TMPL_TARGET    = ['36"切', '40"', '72"', '76"', "3'10\"", "3'15\"", "3'20\"", "3'30\"", 'LT', 'Free'];
const TMPL_REST_REPS = ['R=60"', 'R=90"', "R=2'00\"", "R=3'00\"", 'R=200m jog', 'R=200m60"', 'R=400m jog'];
const TMPL_REST_SETS = ['(空欄)', "set R=3'00\"", "set R=5'00\"", 'set R=400m jog'];

const CSV_HEADERS = [
  '日付','氏名','学年','状態区分','練習タイプ','実施タイプ','場所','内容タグ',
  '距離km','時間分','ブロックNo','距離m','本数','セット数','設定',
  '本数間レスト','セット間レスト','ポイント距離km','セッション表示名','表示用メニュー','備考'
];

// ======================================================
// UTILS
// ======================================================
let _seq = 0;
function uid() { return `${Date.now()}_${++_seq}_${Math.random().toString(36).slice(2,6)}`; }
function today() { return new Date().toISOString().slice(0, 10); }

function buildJogMenu(tag, km, min) {
  const parts = [tag || ''];
  if (km !== '' && km !== undefined && km !== null && km !== 0) parts.push(`${km}km`);
  if (min !== '' && min !== undefined && min !== null && min !== 0) parts.push(`${min}分`);
  return parts.filter(Boolean).join(' ').trim();
}

function buildPointMenu(b) {
  if (!b.distanceM && !b.reps) return '(未入力)';
  let s = `${b.distanceM || '?'}m×${b.reps || '?'}本`;
  if (parseInt(b.sets) > 1) s += `×${b.sets}set`;
  if (b.target) s += ` ${b.target}`;
  if (b.restBetweenReps) s += ` ${b.restBetweenReps}`;
  if (b.restBetweenSets) s += ` ${b.restBetweenSets}`;
  return s;
}

function buildSessionMenu(blocks) {
  return blocks.filter(b => b.distanceM).map(b => {
    const reps = parseInt(b.reps) || 1;
    const sets = parseInt(b.sets) || 1;
    if (reps === 1 && sets === 1) return `${b.distanceM}m`;
    if (sets === 1) return `${b.distanceM}m×${reps}本`;
    return `(${b.distanceM}m×${reps}本)×${sets}set`;
  }).join('+');
}

function calcPointKm(distanceM, reps, sets) {
  const d = parseFloat(distanceM) || 0;
  const r = parseInt(reps) || 0;
  const s = parseInt(sets) || 1;
  return Math.round(d * r * s / 100) / 10;
}

function newBlock(n) {
  return { id: uid(), blockNo: n, distanceM: '', reps: '', sets: 1, target: '', restBetweenReps: '', restBetweenSets: '', note: '' };
}

function recordToRow(r) {
  return [
    r.date, r.name, r.year, r.statusDiv, r.practiceType, r.sessionType || '', r.location, r.contentTag || '',
    r.distanceKm ?? '', r.durationMin ?? '',
    r.blockNo ?? '', r.distanceM ?? '', r.reps ?? '', r.sets ?? '', r.target || '',
    r.restBetweenReps || '', r.restBetweenSets || '', r.pointDistanceKm ?? '',
    r.sessionMenu || '', r.displayMenu || '', r.note || ''
  ];
}

function toCSV(records) {
  const esc = v => {
    const s = String(v ?? '');
    return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
  };
  return [CSV_HEADERS, ...records.map(recordToRow)].map(row => row.map(esc).join(',')).join('\n');
}

function downloadCSV(records, filename) {
  const bom = '﻿';
  const blob = new Blob([bom + toCSV(records)], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function buildPdfHtml(date, sessionName, meta, records) {
  const yOrder = { '4年': 0, '3年': 1, '2年': 2, '1年': 3 };

  // ポイント練習は選手ごとに複数レコード(ブロック数分)があるため、
  // 名前でユニーク化して1行/選手にまとめる（blockNo=1優先 → sessionMenu使用）
  const seenNames = new Set();
  const unique = [];
  records.forEach(r => {
    if (!seenNames.has(r.name)) {
      seenNames.add(r.name);
      unique.push(r);
    }
  });

  const sorted = [...unique].sort((a, b) => {
    if (yOrder[a.year] !== yOrder[b.year]) return (yOrder[a.year] ?? 9) - (yOrder[b.year] ?? 9);
    return a.name.localeCompare(b.name, 'ja');
  });
  const temp = (meta.temperature !== undefined && meta.temperature !== '') ? meta.temperature + '℃' : '—';
  const hum  = (meta.humidity !== undefined && meta.humidity !== '') ? meta.humidity + '%' : '—';
  const wind = meta.wind || '—';
  const loc  = meta.location || '—';
  const dataRows = sorted.map(r => {
    const isInjured = r.statusDiv === '故障';
    const rowBg  = isInjured ? 'background:#fff0f0;' : '';
    const nameSt = isInjured ? 'color:#dc2626;font-weight:bold;' : '';
    const dist = r.practiceType === 'ジョグ・各自'
      ? (r.distanceKm !== '' && r.distanceKm !== undefined ? `${r.distanceKm}km` : '—') : '—';
    const time = r.practiceType === 'ジョグ・各自'
      ? (r.durationMin !== '' && r.durationMin !== undefined ? `${r.durationMin}分` : '—') : '—';
    // ポイント: sessionMenu（全体像）を表示、なければ displayMenu
    const section = r.practiceType === 'ポイント練習'
      ? (r.sessionMenu || r.displayMenu || '—') : '—';
    const nameLabel = `${r.year} ${r.name}${isInjured ? ' ★故障' : ''}`;
    return `<tr style="${rowBg}">
      <td style="border:1px solid #ccc;padding:5px 8px;font-size:12px;${nameSt}">${nameLabel}</td>
      <td style="border:1px solid #ccc;padding:5px 8px;text-align:right;font-size:12px;">${dist}</td>
      <td style="border:1px solid #ccc;padding:5px 8px;text-align:right;font-size:12px;">${time}</td>
      <td style="border:1px solid #ccc;padding:5px 8px;font-size:12px;">${section}</td>
      <td style="border:1px solid #ccc;padding:5px 8px;font-size:12px;">${r.note || ''}</td>
    </tr>`;
  }).join('');
  return `<div style="font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',Meiryo,sans-serif;padding:16px;">
    <div style="text-align:center;font-size:17px;font-weight:bold;margin-bottom:8px;">${date}（${sessionName}）練習記録</div>
    <div style="display:flex;gap:20px;font-size:12px;color:#555;margin-bottom:12px;flex-wrap:wrap;">
      <span>📍 ${loc}</span>
      <span>🌡 ${temp}</span>
      <span>💧 ${hum}</span>
      <span>💨 ${wind}</span>
    </div>
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr style="background:#f3f4f6;">
          <th style="border:1px solid #ccc;padding:5px 8px;text-align:left;font-size:12px;">名前</th>
          <th style="border:1px solid #ccc;padding:5px 8px;text-align:right;font-size:12px;">距離(km)</th>
          <th style="border:1px solid #ccc;padding:5px 8px;text-align:right;font-size:12px;">時間(分)</th>
          <th style="border:1px solid #ccc;padding:5px 8px;text-align:left;font-size:12px;">セクション / メニュー</th>
          <th style="border:1px solid #ccc;padding:5px 8px;text-align:left;font-size:12px;">備考</th>
        </tr>
      </thead>
      <tbody>${dataRows}</tbody>
    </table>
  </div>`;
}

async function postToSheets(scriptUrl, records) {
  await fetch(scriptUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(records),
  });
}

async function testSheetConnection(scriptUrl) {
  const valid = /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec/.test(scriptUrl);
  if (!valid) return { ok: false, reason: 'format' };
  return { ok: true };
}

async function fetchMasterData(scriptUrl) {
  try {
    const res = await fetch(scriptUrl);
    const json = await res.json();
    return json;
  } catch {
    return null;
  }
}

// ======================================================
// HOOKS
// ======================================================
function useLS(key, init) {
  const [val, setVal] = useState(() => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : init; }
    catch { return init; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

// ======================================================
// SHEETS COMPONENTS
// ======================================================
function SyncToast({ state }) {
  if (!state) return null;
  const cfg = {
    syncing: { bg: 'bg-blue-600 text-white',   icon: '🔄', msg: 'Sheetsに送信中...' },
    ok:      { bg: 'bg-green-600 text-white',  icon: '✅', msg: `Sheets送信完了（${state.count}件）` },
    error:   { bg: 'bg-red-500 text-white',    icon: '❌', msg: '送信失敗 — ローカルには保存済み。【再送】で手動再送できます' },
  }[state.status] || null;
  if (!cfg) return null;
  return (
    <div className={`sync-toast ${cfg.bg}`}>
      {cfg.icon} {cfg.msg}
    </div>
  );
}

function SettingsModal({ scriptUrl, onSave, onClose }) {
  const [url, setUrl]         = useState(scriptUrl);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const handleTest = async () => {
    if (!url.trim()) return;
    setTesting(true); setTestResult(null);
    try {
      const result = await testSheetConnection(url.trim());
      setTestResult(result.ok ? 'ok' : result.reason === 'format' ? 'format' : 'error');
    } catch {
      setTestResult('error');
    } finally {
      setTesting(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-5">
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-base font-bold text-gray-800">⚙ Google Sheets 連携設定</h2>
          <button type="button" onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
        </div>

        <div className="mb-4 p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-800 leading-relaxed">
          <strong>設定手順</strong><br/>
          1. Google Sheets → 拡張機能 → Apps Script にコードを貼り付けて保存<br/>
          2. 「デプロイ」→「新しいデプロイ」→ ウェブアプリ<br/>
          3. 実行ユーザー：自分　／　アクセス：全員<br/>
          4. 発行されたURLを下に貼り付け
        </div>

        <label className="block mb-3">
          <span className="block text-xs text-gray-500 mb-1 font-semibold">Apps Script URL</span>
          <input type="url" value={url} onChange={e => { setUrl(e.target.value); setTestResult(null); }}
            placeholder="https://script.google.com/macros/s/..."
            className="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 outline-none font-mono" />
        </label>

        <div className="flex items-center gap-2 mb-5">
          <button type="button" onClick={handleTest} disabled={!url.trim() || testing}
            className="px-4 py-1.5 text-sm border border-blue-400 text-blue-600 rounded-lg hover:bg-blue-50 disabled:opacity-40 transition-colors">
            {testing ? '確認中...' : '接続テスト'}
          </button>
          {testResult === 'ok'     && <span className="text-xs text-green-700 font-medium">✅ URLの形式OK<br/><span className="text-gray-500 font-normal">保存後、ジョグを1件入力して保存→Sheetsに行が追加されれば接続成功です</span></span>}
          {testResult === 'format' && <span className="text-xs text-red-600 font-medium">❌ URLの形式が違います<br/><span className="text-gray-500">https://script.google.com/macros/s/.../exec の形式か確認してください</span></span>}
          {testResult === 'error'  && <span className="text-xs text-red-600 font-medium">❌ 送信できませんでした<br/><span className="text-gray-500">デプロイ設定「アクセス：全員」を再確認してください</span></span>}
        </div>

        <div className="flex gap-2 justify-end">
          <button type="button" onClick={onClose}
            className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700 transition-colors">キャンセル</button>
          <button type="button" onClick={() => { onSave(url.trim()); onClose(); }}
            className="px-5 py-2 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
            保存
          </button>
        </div>
      </div>
    </div>
  );
}

// ======================================================
// SHARED COMPONENTS
// ======================================================
function CustomTmplField({ label, required, value, onChange, placeholder, type,
                           defaultItems, customItems, onAddCustom, onRemoveCustom }) {
  const [adding, setAdding] = useState(false);
  const [newVal, setNewVal] = useState('');
  const handleAdd = () => {
    const v = newVal.trim();
    if (!v) return;
    onAddCustom(v);
    setNewVal(''); setAdding(false);
  };
  return (
    <div>
      <label className="block text-xs text-gray-500 mb-0.5">
        {label}{required && <span className="text-red-400 ml-0.5">*</span>}
      </label>
      <input type={type || 'text'} value={value} onChange={e => onChange(e.target.value)}
        className="w-full border rounded px-2 py-1.5 text-sm focus:ring-2 focus:ring-orange-200 outline-none"
        placeholder={placeholder} />
      <div className="flex flex-wrap gap-1 mt-1">
        {defaultItems.map(item => (
          <button key={item} type="button" className="tmpl-btn"
            onClick={() => onChange(String(item))}>{item}</button>
        ))}
        {(customItems || []).map((item, i) => (
          <span key={i} className="inline-flex items-center">
            <button type="button" className="tmpl-btn"
              style={{background:'#eff6ff',borderColor:'#93c5fd',color:'#1d4ed8'}}
              onClick={() => onChange(item)}>{item}</button>
            <button type="button" onClick={() => onRemoveCustom(i)}
              className="text-red-400 hover:text-red-600 text-xs ml-0.5 leading-none">×</button>
          </span>
        ))}
        {adding ? (
          <span className="inline-flex items-center gap-1">
            <input type="text" value={newVal} onChange={e => setNewVal(e.target.value)}
              onKeyDown={e => { if (e.key==='Enter') handleAdd(); if (e.key==='Escape') setAdding(false); }}
              className="border rounded px-1.5 py-0.5 text-xs w-20 focus:ring-1 focus:ring-blue-300 outline-none"
              autoFocus placeholder="値を入力" />
            <button type="button" onClick={handleAdd}
              className="text-xs text-green-600 hover:text-green-800 font-medium">追加</button>
            <button type="button" onClick={() => { setAdding(false); setNewVal(''); }}
              className="text-xs text-gray-400 hover:text-gray-600">×</button>
          </span>
        ) : (
          <button type="button" onClick={() => setAdding(true)}
            className="tmpl-btn border-dashed text-gray-400 hover:text-blue-500 hover:border-blue-400">＋</button>
        )}
      </div>
    </div>
  );
}

function Warnings({ warns, onClose }) {
  if (!warns.length) return null;
  return (
    <div className="mb-3 p-3 bg-yellow-50 border border-yellow-300 rounded-lg">
      {warns.map((w, i) => <div key={i} className="text-sm text-yellow-800">⚠ {w}</div>)}
      <button className="text-xs text-gray-500 mt-1 underline" onClick={onClose}>閉じる</button>
    </div>
  );
}

function SavedToast({ show }) {
  if (!show) return null;
  return <span className="text-green-600 text-sm font-medium ml-3">✓ 保存しました</span>;
}

// ======================================================
// PERSON SELECT MODAL
// ======================================================
function PersonSelectModal({ athletes, onConfirm }) {
  const [step, setStep] = useState(1);
  const [name, setName] = useState('');
  const sortedAthletes = [...athletes].sort((a, b) => {
    const yOrder = { '4年': 0, '3年': 1, '2年': 2, '1年': 3 };
    if (yOrder[a.year] !== yOrder[b.year]) return (yOrder[a.year]??9) - (yOrder[b.year]??9);
    return a.name.localeCompare(b.name, 'ja');
  });
  return (
    <div className="modal-overlay">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
        <div className="text-4xl mb-3">🏃‍♀️</div>
        <h2 className="text-lg font-bold text-gray-800 mb-5">女子駅伝部 練習記録</h2>
        {step === 1 && (
          <>
            <p className="text-sm text-gray-500 mb-5">使用者を選択してください</p>
            <div className="flex flex-col gap-3">
              <button onClick={() => onConfirm('manager', null)}
                className="w-full py-4 bg-blue-600 text-white text-base font-bold rounded-xl hover:bg-blue-700 transition-colors shadow-sm">
                👑 マネージャー
              </button>
              <button onClick={() => setStep(2)}
                className="w-full py-4 bg-green-600 text-white text-base font-bold rounded-xl hover:bg-green-700 transition-colors shadow-sm">
                🏃 選手
              </button>
            </div>
          </>
        )}
        {step === 2 && (
          <>
            <p className="text-sm text-gray-500 mb-4">あなたの名前を選択してください</p>
            {sortedAthletes.length === 0 && (
              <div className="mb-4 p-3 bg-yellow-50 border border-yellow-200 rounded-lg text-xs text-yellow-800 text-left">
                ⚠ 選手情報を読み込み中です。<br/>
                Google Sheetsとの連携設定が完了していない場合は、マネージャーとしてログインして設定を行ってください。
              </div>
            )}
            <select value={name} onChange={e => setName(e.target.value)}
              disabled={sortedAthletes.length === 0}
              className="w-full border rounded-lg px-3 py-2 text-sm mb-4 focus:ring-2 focus:ring-green-300 outline-none disabled:opacity-50">
              <option value="">{sortedAthletes.length === 0 ? '（選手情報なし）' : '選択してください'}</option>
              {sortedAthletes.map(a => (
                <option key={a.name} value={a.name}>{a.year} {a.name}</option>
              ))}
            </select>
            <button onClick={() => { if (name) onConfirm('athlete', name); }} disabled={!name}
              className="w-full py-3 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 disabled:opacity-40 transition-colors mb-2">
              決定
            </button>
            <button onClick={() => setStep(1)}
              className="w-full py-2 text-sm text-gray-400 hover:text-gray-600 transition-colors">
              ← 戻る
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ======================================================
// ADMIN PIN MODAL
// ======================================================
function AdminPinModal({ mode, savedPin, onSuccess, onClose }) {
  const [pin, setPin]       = useState('');
  const [confirm, setConfirm] = useState('');
  const [error, setError]   = useState('');
  const handleSubmit = () => {
    if (mode === 'set') {
      if (pin.length < 4) { setError('4文字以上で設定してください'); return; }
      if (pin !== confirm) { setError('PINが一致しません'); return; }
      onSuccess(pin);
    } else {
      if (pin === savedPin) { onSuccess(null); }
      else { setError('PINが違います'); setPin(''); }
    }
  };
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-xs p-6">
        <h2 className="text-base font-bold text-gray-800 mb-4">
          🔒 {mode === 'set' ? '管理画面PINを設定' : '管理画面PIN入力'}
        </h2>
        <input type="password" value={pin} onChange={e => { setPin(e.target.value); setError(''); }}
          onKeyDown={e => e.key === 'Enter' && handleSubmit()}
          placeholder={mode === 'set' ? '新しいPIN（4文字以上）' : 'PIN'}
          className="w-full border rounded px-3 py-2 text-sm mb-2 focus:ring-2 focus:ring-blue-300 outline-none" />
        {mode === 'set' && (
          <input type="password" value={confirm} onChange={e => { setConfirm(e.target.value); setError(''); }}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
            placeholder="PINを再入力"
            className="w-full border rounded px-3 py-2 text-sm mb-2 focus:ring-2 focus:ring-blue-300 outline-none" />
        )}
        {error && <p className="text-xs text-red-600 mb-2">{error}</p>}
        <div className="flex gap-2 mt-3">
          <button onClick={onClose}
            className="flex-1 py-2 text-sm text-gray-500 hover:text-gray-700">キャンセル</button>
          <button onClick={handleSubmit}
            className="flex-1 py-2 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700">
            {mode === 'set' ? '設定' : '解除'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ======================================================
// JOG VIEW
// ======================================================
function JogView({ common, onSave, onSaveSessionMeta, athletes, contentTags, records, myName }) {
  const [rows, setRows]           = useState([]);
  const [yearFilter, setFilter]   = useState('全員');
  const [warns, setWarns]         = useState([]);
  const [saved, setSaved]         = useState(false);
  const [prevValues, setPrevValues] = useLS('ekiden_prev_jog', {});
  const [bulkKm, setBulkKm]       = useState('');
  const [bulkMin, setBulkMin]     = useState('');
  const [bulkContentTag, setBulkContentTag] = useState('');
  const [bulkStatusDiv, setBulkStatusDiv] = useState('');
  const [bulkNote, setBulkNote]   = useState('');
  const [checkedNames, setCheckedNames] = useState(new Set());
  const [showUnenteredOnly, setShowUnenteredOnly] = useState(false);

  // checkedNames を日付変更時にリセット
  useEffect(() => { setCheckedNames(new Set()); }, [common.s.date]);

  // records への最新参照を保持（useEffect依存配列を増やさずに済む）
  const recordsRef = useRef(records);
  useEffect(() => { recordsRef.current = records; });

  useEffect(() => {
    const sorted = [...athletes].sort((a, b) => {
      const yOrder = { '4年': 0, '3年': 1, '2年': 2, '1年': 3 };
      if (yOrder[a.year] !== yOrder[b.year]) return yOrder[a.year] - yOrder[b.year];
      return a.name.localeCompare(b.name, 'ja');
    });
    // 選手ごとの最新 statusDiv を records から取得（故障者を赤表示するため）
    const latestStatus = {};
    (recordsRef.current || []).forEach(r => {
      if (r.statusDiv && (!latestStatus[r.name] || r.date > latestStatus[r.name].date)) {
        latestStatus[r.name] = { date: r.date, statusDiv: r.statusDiv };
      }
    });
    setRows(sorted.map(a => ({
      name: a.name,
      year: a.year,
      distanceKm: '',
      durationMin: '',
      contentTag: prevValues.contentTag || (contentTags[0] || ''),
      statusDiv: latestStatus[a.name]?.statusDiv || '通常',
      note: ''
    })));
  }, [athletes, contentTags]);

  // 未記入選手の計算
  const enteredNames = new Set(
    (records || []).filter(r => r.date === common.s.date).map(r => r.name)
  );
  const unenteredAthletes = athletes.filter(a => !enteredNames.has(a.name));
  const hasExistingRecords = enteredNames.size > 0;

  // 表示選手のフィルタリング
  const displayed = (() => {
    let base = yearFilter === '全員' ? rows : rows.filter(r => r.year === yearFilter);
    if (myName) base = base.filter(r => r.name === myName);
    else if (showUnenteredOnly) base = base.filter(r => !enteredNames.has(r.name));
    return base;
  })();

  // チェックボックス操作
  const allChecked = displayed.length > 0 && displayed.every(r => checkedNames.has(r.name));
  const toggleAll = () => {
    if (allChecked) {
      setCheckedNames(prev => { const s = new Set(prev); displayed.forEach(r => s.delete(r.name)); return s; });
    } else {
      setCheckedNames(prev => { const s = new Set(prev); displayed.forEach(r => s.add(r.name)); return s; });
    }
  };
  const toggleOne = (name) => {
    setCheckedNames(prev => { const s = new Set(prev); s.has(name) ? s.delete(name) : s.add(name); return s; });
  };

  const update = (name, field, val) =>
    setRows(prev => prev.map(r => r.name === name ? { ...r, [field]: val } : r));

  // 機能4: 前日コピー
  const handlePrevDayCopy = () => {
    const currentDate = common.s.date;
    const prevDate = new Date(new Date(currentDate).getTime() - 86400000).toISOString().slice(0, 10);
    const prevRecs = (records || []).filter(r => r.date === prevDate && r.practiceType === 'ジョグ・各自');
    if (prevRecs.length === 0) {
      alert('前日の記録が見つかりません');
      return;
    }
    setRows(prev => prev.map(r => {
      const found = prevRecs.find(p => p.name === r.name);
      if (found) {
        return { ...r,
          distanceKm: found.distanceKm !== '' && found.distanceKm !== undefined ? String(found.distanceKm) : r.distanceKm,
          durationMin: found.durationMin !== '' && found.durationMin !== undefined ? String(found.durationMin) : r.durationMin,
          contentTag: found.contentTag || r.contentTag,
        };
      }
      return r;
    }));
  };

  // 機能5: 一括入力（チェックボックスで選択した選手のみ）
  const handleBulkApply = () => {
    if (bulkKm === '' && bulkMin === '' && bulkContentTag === '' && bulkStatusDiv === '' && bulkNote === '') return;
    if (checkedNames.size === 0) return;
    setRows(prev => prev.map(r => {
      if (!checkedNames.has(r.name)) return r;
      return {
        ...r,
        ...(bulkKm !== '' ? { distanceKm: bulkKm } : {}),
        ...(bulkMin !== '' ? { durationMin: bulkMin } : {}),
        ...(bulkContentTag !== '' ? { contentTag: bulkContentTag } : {}),
        ...(bulkStatusDiv !== '' ? { statusDiv: bulkStatusDiv } : {}),
        ...(bulkNote !== '' ? { note: bulkNote } : {}),
      };
    }));
    setCheckedNames(new Set());
    setBulkKm('');
    setBulkMin('');
    setBulkContentTag('');
    setBulkStatusDiv('');
    setBulkNote('');
  };

  const handleSave = () => {
    const w = [];
    const dateMs = new Date(common.s.date).getTime();
    const nowMs  = Date.now();
    if (dateMs > nowMs + 30 * 86400000)  w.push('日付が30日以上未来です。確認してください。');
    if (dateMs < nowMs - 365 * 86400000) w.push('日付が1年以上前です。確認してください。');

    const filled = rows.filter(r => r.distanceKm !== '' || r.durationMin !== '');
    filled.forEach(r => {
      if (r.distanceKm !== '' && parseFloat(r.distanceKm) > 50)
        w.push(`${r.name}: 距離が50kmを超えています。`);
    });

    const toSave = rows.filter(r => r.distanceKm !== '' || r.durationMin !== '' || r.note !== '');
    if (toSave.length === 0) {
      setWarns(['入力された行がありません（距離・時間・備考のいずれかを入力してください）。']);
      return;
    }
    setWarns(w);
    const recs = toSave.map(r => ({
      id: uid(), date: common.s.date, name: r.name, year: r.year,
      statusDiv: r.statusDiv, practiceType: 'ジョグ・各自', sessionType: '',
      location: common.s.location,
      sessionName: common.s.sessionName || '朝練習',
      distanceKm: r.distanceKm !== '' ? parseFloat(r.distanceKm) : '',
      durationMin: r.durationMin !== '' ? parseInt(r.durationMin) : '',
      contentTag: r.contentTag,
      displayMenu: buildJogMenu(r.contentTag, r.distanceKm, r.durationMin),
      note: r.note,
      blockNo: '', distanceM: '', reps: '', sets: '', target: '',
      restBetweenReps: '', restBetweenSets: '', pointDistanceKm: '', sessionMenu: '',
    }));
    // セッションメタデータを保存
    if (onSaveSessionMeta) {
      onSaveSessionMeta(common.s.date, common.s.sessionName || '朝練習', {
        temperature: common.s.temperature, humidity: common.s.humidity,
        wind: common.s.wind, location: common.s.location,
      });
    }
    setPrevValues({ contentTag: toSave[0]?.contentTag || '', statusDiv: toSave[0]?.statusDiv || '通常' });
    onSave(recs);
    setPrevValues({ contentTag: toSave[0]?.contentTag || '' });
    setSaved(true);
    setRows(rows.map(r => ({ ...r, distanceKm: '', durationMin: '', note: '' })));
    setTimeout(() => setSaved(false), 3000);
  };

  return (
    <div>
      <CommonSettings s={common.s} onChange={common.onChange} contentTags={contentTags} />

      {!myName && (
        <div className="flex flex-wrap gap-2 mb-3 items-center">
          <span className="text-xs text-gray-500 font-medium">表示絞込:</span>
          {['全員', ...YEARS].map(y => (
            <button key={y} type="button" onClick={() => setFilter(y)}
              className={`px-3 py-1 text-xs rounded-full border transition-colors font-medium
                ${yearFilter === y ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>
              {y}
            </button>
          ))}
        </div>
      )}

      <Warnings warns={warns} onClose={() => setWarns([])} />

      {/* 未記入バナー（マネージャーモードのみ） */}
      {!myName && hasExistingRecords && (
        <UnenteredBanner
          athletes={unenteredAthletes}
          showOnly={showUnenteredOnly}
          onToggleFilter={() => setShowUnenteredOnly(p => !p)}
        />
      )}

      {/* 一括入力エリア（チェックボックス方式） */}
      {!myName && (
        <div className="mb-3 p-3 bg-blue-50 border border-blue-100 rounded-lg space-y-2">
          <div className="flex flex-wrap gap-2 items-center">
            <span className="text-xs font-semibold text-gray-700">一括入力:</span>
            <input type="number" step="0.1" min="0" value={bulkKm} onChange={e => setBulkKm(e.target.value)}
              placeholder="距離 km" style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#00a8cc'}} className="w-24 border-2 rounded px-2 py-1 text-sm font-semibold outline-none" />
            <input type="number" step="1" min="0" value={bulkMin} onChange={e => setBulkMin(e.target.value)}
              placeholder="時間 分" style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#00a8cc'}} className="w-24 border-2 rounded px-2 py-1 text-sm font-semibold outline-none" />
            <select value={bulkContentTag} onChange={e => setBulkContentTag(e.target.value)}
              style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#1f2937'}} className="border-2 rounded px-2 py-1 text-xs outline-none">
              <option value="">タグ選択（変更なし）</option>
              {contentTags.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
            <select value={bulkStatusDiv} onChange={e => setBulkStatusDiv(e.target.value)}
              style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#1f2937'}} className="border-2 rounded px-2 py-1 text-xs outline-none">
              <option value="">状態区分（変更なし）</option>
              {STATUS_DIVS.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <input type="text" value={bulkNote} onChange={e => setBulkNote(e.target.value)}
              placeholder="備考" style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#00a8cc'}} className="flex-1 min-w-[150px] border-2 rounded px-2 py-1 text-sm font-semibold outline-none" />
          </div>
          <div className="flex flex-wrap gap-2 items-center">
            <button type="button" onClick={handleBulkApply}
              disabled={checkedNames.size === 0}
              style={{background: 'linear-gradient(135deg, #a52a2a 0%, #8b3a3a 100%)', boxShadow: '0 4px 12px rgba(165, 42, 42, 0.2)'}}
              className="px-3 py-1 text-white text-xs rounded-lg hover:opacity-90 disabled:opacity-40 transition-opacity font-semibold">
              選択した{checkedNames.size}人に適用
            </button>
            {checkedNames.size > 0 && (
              <button type="button" onClick={() => setCheckedNames(new Set())}
                className="px-3 py-1 bg-gray-400 text-white text-xs rounded-lg hover:bg-gray-500 transition-colors font-semibold">
                🔲 選択解除
              </button>
            )}
            <span className="text-xs text-gray-600">（チェックした選手のみ・入力した項目のみ反映）</span>
          </div>
        </div>
      )}

      {/* PC用テーブル */}
      <div className="hidden md:block overflow-x-auto rounded-lg border border-gray-200 shadow-sm bg-white">
        <table className="w-full text-sm min-w-[600px]">
          <thead style={{background: 'linear-gradient(135deg, #faf5f5 0%, #f5f0f0 100%)', borderBottomColor: 'rgba(0, 217, 255, 0.2)'}} className="border-b-2">
            <tr>
              {!myName && (
                <th className="px-3 py-2.5 text-center text-xs text-gray-500 font-semibold w-8">
                  <input type="checkbox" checked={allChecked} onChange={toggleAll}
                    className="w-3 h-3" style={{accentColor: '#a52a2a'}} title="全選択/解除" />
                </th>
              )}
              <th className="px-3 py-2.5 text-left text-xs font-semibold w-24" style={{color: '#a52a2a'}}>選手名</th>
              <th className="px-2 py-2.5 text-center text-xs font-semibold w-20" style={{color: '#a52a2a'}}>距離 km</th>
              <th className="px-2 py-2.5 text-center text-xs font-semibold w-20" style={{color: '#a52a2a'}}>時間 分</th>
              <th className="px-2 py-2.5 text-center text-xs font-semibold w-24" style={{color: '#a52a2a'}}>内容タグ</th>
              <th className="px-2 py-2.5 text-center text-xs font-semibold w-20" style={{color: '#a52a2a'}}>状態区分</th>
              <th className="px-2 py-2.5 text-left text-xs font-semibold" style={{color: '#a52a2a'}}>備考</th>
            </tr>
          </thead>
          <tbody>
            {displayed.map((row, i) => (
              <tr key={row.name} className={
                checkedNames.has(row.name)
                  ? 'bg-cyan-50 border-l-4 border-cyan-400'
                  : (row.statusDiv === '故障'
                      ? 'bg-red-50'
                      : (i % 2 === 0 ? 'bg-white' : 'bg-gray-50/40'))
              }>
                {!myName && (
                  <td className="px-3 py-1.5 text-center">
                    <input type="checkbox" checked={checkedNames.has(row.name)} onChange={() => toggleOne(row.name)}
                      className="w-3 h-3 accent-blue-600" />
                  </td>
                )}
                <td className="px-3 py-1.5">
                  <span className={`font-medium text-xs block leading-tight ${row.statusDiv === '故障' ? 'text-red-600 font-bold' : 'text-gray-800'}`}>{row.name}</span>
                  <span className="text-xs text-gray-400">{row.year}</span>
                </td>
                <td className="px-2 py-1.5">
                  <input type="number" step="0.1" min="0" value={row.distanceKm}
                    onChange={e => update(row.name, 'distanceKm', e.target.value)}
                    style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#00a8cc'}}
                    className="w-full border-2 rounded px-2 py-1 text-sm text-right font-semibold focus:ring-2 outline-none"
                    placeholder="—" />
                </td>
                <td className="px-2 py-1.5">

                    style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#00a8cc'}}
                    className="w-full border-2 rounded px-2 py-1 text-sm text-right font-semibold focus:ring-2 outline-none"

                  <select value={row.contentTag} onChange={e => update(row.name, 'contentTag', e.target.value)}
                    style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#1f2937'}}

                    {contentTags.map(t => <option key={t}>{t}</option>)}
                  </select>
                </td>
                <td className="px-2 py-1.5">
                  <select value={row.statusDiv} onChange={e => update(row.name, 'statusDiv', e.target.value)}
                    style={{borderColor: 'rgba(0, 217, 255, 0.25)', background: 'linear-gradient(135deg, #f8feff 0%, #f0f9ff 100%)', color: '#1f2937'}}
                    className="w-full border-2 rounded px-1 py-1 text-xs focus:ring-2 outline-none">
